<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Jurnal Quran - Arief</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#059669">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Jurnal Quran">
    <link rel="apple-touch-icon" href="/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
        * { font-family: 'Outfit', sans-serif; }
        @keyframes bounce-subtle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); } 70% { box-shadow: 0 0 0 12px rgba(16,185,129,0); } 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); } }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
        .anim-bounce { animation: bounce-subtle 3s ease-in-out infinite; }
        .anim-spin { animation: spin-slow 10s linear infinite; }
        .anim-pulse { animation: pulse-ring 2s infinite; }
        .anim-fadeup { animation: fadeUp 0.35s ease both; }
        .shimmer-text {
            background: linear-gradient(90deg, #10b981, #34d399, #6ee7b7, #34d399, #10b981);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body { overscroll-behavior-y: none; -webkit-tap-highlight-color: transparent; user-select: none; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        header { padding-top: calc(1.5rem + var(--safe-top)); }
        nav.bottom-nav { padding-bottom: calc(var(--safe-bottom) + 4px); height: auto !important; min-height: 4.5rem; }
        input { user-select: auto; }
        ::-webkit-scrollbar { display: none; }
        input[type="number"], input[type="text"] { font-size: 16px !important; }
        @media (orientation: landscape) and (max-height: 500px) {
            body::before { content: 'Putar ke portrait untuk tampilan terbaik'; position: fixed; inset: 0; z-index: 9999; background: #059669; color: white; display: flex; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 800; text-align: center; padding: 2rem; }
            body > * { display: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
<div id="root"></div>
<script src="/app.js"></script>
</body>
</html>

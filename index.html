        const JUZ_START = [
          { juz: 1, s: 1, v: 1 }, { juz: 2, s: 2, v: 142 }, { juz: 3, s: 2, v: 253 },
          { juz: 4, s: 3, v: 93 }, { juz: 5, s: 4, v: 24 }, { juz: 6, s: 4, v: 148 },
          { juz: 7, s: 5, v: 82 }, { juz: 8, s: 6, v: 111 }, { juz: 9, s: 7, v: 88 },
          { juz: 10, s: 8, v: 41 }, { juz: 11, s: 9, v: 93 }, { juz: 12, s: 11, v: 6 },
          { juz: 13, s: 12, v: 53 }, { juz: 14, s: 15, v: 1 }, { juz: 15, s: 17, v: 1 },
          { juz: 16, s: 18, v: 75 }, { juz: 17, s: 21, v: 1 }, { juz: 18, s: 23, v: 1 },
          { juz: 19, s: 25, v: 21 }, { juz: 20, s: 27, v: 56 }, { juz: 21, s: 29, v: 46 },
          { juz: 22, s: 33, v: 31 }, { juz: 23, s: 36, v: 28 }, { juz: 24, s: 39, v: 32 },
          { juz: 25, s: 41, v: 47 }, { juz: 26, s: 46, v: 1 }, { juz: 27, s: 51, v: 31 },
          { juz: 28, s: 58, v: 1 }, { juz: 29, s: 67, v: 1 }, { juz: 30, s: 78, v: 1 }
        ];

        // --- ICON WRAPPER ---
        const Icon = ({ name, ...props }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} {...props}></i>;
        };

        // --- HELPERS ---
        const getAbsoluteVerseCount = (surahNum, verseNum) => {
          let total = 0;
          for (let i = 1; i < surahNum; i++) {
            const s = SURAH_DATA.find(x => x.number === i);
            if (s) total += s.verses;
          }
          total += verseNum;
          return total;
        };

        const getJuzForVerse = (surahNum, verseNum) => {
          let v = verseNum === 0 ? 1 : verseNum;
          for (let i = 0; i < JUZ_START.length; i++) {
            const curr = JUZ_START[i];
            const next = JUZ_START[i + 1];
            if (!next) return 30;
            if (surahNum < next.s || (surahNum === next.s && v < next.v)) return curr.juz;
          }
          return 30;
        };

        const getJuzSegments = (juzNum) => {
          const startMarker = JUZ_START.find(j => j.juz === juzNum);
          const endMarker = juzNum === 30 ? null : JUZ_START.find(j => j.juz === juzNum + 1);
          const segments = [];
          let currentSurah = startMarker.s;
          let currentVerse = startMarker.v;
          while (true) {
            const surahInfo = SURAH_DATA.find(s => s.number === currentSurah);
            if (!surahInfo) break;
            const maxVerse = surahInfo.verses;
            if (endMarker && currentSurah === endMarker.s) {
              segments.push({ s: currentSurah, start: currentVerse, end: endMarker.v - 1 });
              break;
            } else {
              segments.push({ s: currentSurah, start: currentVerse, end: maxVerse });
              if (!endMarker && currentSurah === 114) break;
              currentSurah++;
              currentVerse = 1;
            }
          }
          return segments;
        };

        const isJuzComplete = (juzNum, progressObj) => {
          const segments = getJuzSegments(juzNum);
          return segments.every(seg => (progressObj[seg.s] || 0) >= seg.end);
        };

        const JUZ_LIST = Array.from({ length: 30 }, (_, i) => {
          const num = i + 1;
          const start = JUZ_START.find(j => j.juz === num);
          const surahName = SURAH_DATA.find(s => s.number === start.s).name;
          return { number: num, start: `${surahName} ayat ${start.v}` };
        });

        const loadLocal = (key, fallback) => {
          if (typeof window !== 'undefined') {
            const saved = localStorage.getItem(key);
            if (saved) {
              try { return JSON.parse(saved); } catch (e) { return saved; }
            }
          }
          return fallback;
        };

        // --- MAIN APP ---
        function App() {
            const [viewMode, setViewMode] = useState('surah');
            const [searchTerm, setSearchTerm] = useState("");
            const [showScrollTop, setShowScrollTop] = useState(false);
            const [progress, setProgress] = useState(() => loadLocal('quran-progress', {}));
            const [lastRead, setLastRead] = useState(() => loadLocal('quran-last-read', null));
            const [streak, setStreak] = useState(() => parseInt(loadLocal('quran-streak', 0)));
            const [lastActiveDate, setLastActiveDate] = useState(() => loadLocal('quran-last-date', null));
            const [khatamCount, setKhatamCount] = useState(() => parseInt(loadLocal('quran-khatam', 0)));
            const [targetJuz, setTargetJuz] = useState(() => loadLocal('quran-target-juz', null));
            const [dailyStartVerses, setDailyStartVerses] = useState(() => parseInt(loadLocal('quran-daily-start', 0)));
            const [targetDate, setTargetDate] = useState(() => loadLocal('quran-target-date', new Date().toLocaleDateString('en-CA')));

            useEffect(() => {
                localStorage.setItem('quran-progress', JSON.stringify(progress));
                if (lastRead) localStorage.setItem('quran-last-read', lastRead);
                localStorage.setItem('quran-streak', streak);
                if (lastActiveDate) localStorage.setItem('quran-last-date', lastActiveDate);
                localStorage.setItem('quran-khatam', khatamCount);
                if (targetJuz) localStorage.setItem('quran-target-juz', targetJuz); 
                else localStorage.removeItem('quran-target-juz');
                localStorage.setItem('quran-daily-start', dailyStartVerses);
                localStorage.setItem('quran-target-date', targetDate);
            }, [progress, lastRead, streak, lastActiveDate, khatamCount, targetJuz, dailyStartVerses, targetDate]);

            useEffect(() => {
                const handleScroll = () => setShowScrollTop(window.scrollY > 300);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });

            const recordActivity = () => {
                const today = new Date().toLocaleDateString('en-CA'); 
                if (lastActiveDate !== today) {
                    if (lastActiveDate) {
                        const lastDate = new Date(lastActiveDate);
                        const currentDate = new Date(today);
                        const diffDays = Math.ceil(Math.abs(currentDate - lastDate) / (1000 * 60 * 60 * 24)); 
                        if (diffDays === 1) setStreak(prev => prev + 1); 
                        else setStreak(1); 
                    } else { setStreak(1); }
                    setLastActiveDate(today);
                }
                if (targetDate !== today) {
                    setTargetDate(today);
                    setDailyStartVerses(currentTotalVerses);
                }
            };

            const currentTotalVerses = useMemo(() => {
                let total = 0;
                SURAH_DATA.forEach(s => { total += progress[s.number] || 0; });
                return total;
            }, [progress]);

            const targetStats = useMemo(() => {
                if (!targetJuz) return null;
                let targetTotalVerses;
                let targetLabel;
                if (parseInt(targetJuz) === 31) {
                    targetTotalVerses = 6236;
                    targetLabel = "Khatam";
                } else {
                    const juzInfo = JUZ_START.find(j => j.juz === parseInt(targetJuz));
                    if (!juzInfo) return null;
                    targetTotalVerses = getAbsoluteVerseCount(juzInfo.s, juzInfo.v - 1);
                    targetLabel = `Awal Juz ${targetJuz}`;
                }
                const versesReadToday = Math.max(0, currentTotalVerses - dailyStartVerses);
                const versesToReadToday = Math.max(1, targetTotalVerses - dailyStartVerses); 
                const isReached = currentTotalVerses >= targetTotalVerses;
                let percentage = isReached ? 100 : Math.round((versesReadToday / versesToReadToday) * 100);
                return { targetLabel, versesReadToday, versesToReadToday, percentage, isReached };
            }, [targetJuz, currentTotalVerses, dailyStartVerses]);

            const stats = useMemo(() => {
                let surahsCompleted = 0;
                SURAH_DATA.forEach(surah => {
                  if ((progress[surah.number] || 0) === surah.verses) surahsCompleted += 1;
                });
                let juzCompleted = 0;
                for (let i = 1; i <= 30; i++) {
                  if (isJuzComplete(i, progress)) juzCompleted += 1;
                }
                const percentage = Math.round((currentTotalVerses / 6236) * 100);
                return { percentage, surahsCompleted, juzCompleted, isKhatam: currentTotalVerses === 6236 };
            }, [progress, currentTotalVerses]);

            const updateVerse = (surahNumber, verse) => {
                recordActivity();
                const surah = SURAH_DATA.find(s => s.number === surahNumber);
                let newVerse = Math.max(0, Math.min(verse, surah.verses));
                setProgress(prev => ({ ...prev, [surahNumber]: newVerse }));
                setLastRead(surahNumber);
            };

            const toggleComplete = (surahNumber) => {
                const surah = SURAH_DATA.find(s => s.number === surahNumber);
                updateVerse(surah.number, (progress[surah.number] || 0) === surah.verses ? 0 : surah.verses);
            };

            const toggleJuz = (juzNumber) => {
                recordActivity();
                const segments = getJuzSegments(juzNumber);
                const completed = isJuzComplete(juzNumber, progress);
                setProgress(prev => {
                    const next = { ...prev };
                    segments.forEach(seg => {
                        next[seg.s] = completed ? Math.min(next[seg.s] || 0, seg.start - 1) : Math.max(next[seg.s] || 0, seg.end);
                    });
                    return next;
                });
                setLastRead(segments[segments.length - 1].s);
            };

            const filteredSurahs = SURAH_DATA.filter(s => 
                s.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                s.number.toString() === searchTerm
            );

            const filteredJuz = JUZ_LIST.filter(j => j.number.toString().includes(searchTerm));

            return (
                <div className="pb-24">
                    <header className="bg-emerald-600 text-white pt-8 pb-14 px-5 rounded-b-[3rem] shadow-xl relative overflow-hidden">
                        <div className="relative z-10">
                            <div className="flex justify-between items-center mb-6">
                                <div>
                                    <h1 className="text-2xl font-black tracking-tight">Jurnal Quran</h1>
                                    <p className="text-emerald-100 text-[11px] font-bold uppercase">Progress Bacaan Quran</p>
                                </div>
                                <div className="flex gap-2">
                                    {streak > 0 && <div className="bg-white/20 px-3 py-1.5 rounded-full text-[10px] font-black">🔥 {streak}d</div>}
                                    {khatamCount > 0 && <div className="bg-white/20 px-3 py-1.5 rounded-full text-[10px] font-black">🏆 {khatamCount}x</div>}
                                </div>
                            </div>
                            <div className="bg-white/10 backdrop-blur-xl rounded-3xl p-6 border border-white/20">
                                <div className="flex justify-between items-baseline mb-4">
                                    <span className="text-[10px] font-black uppercase text-emerald-100 opacity-80">Total Progress</span>
                                    <span className="text-5xl font-black tabular-nums">{stats.percentage}%</span>
                                </div>
                                <div className="w-full bg-black/10 rounded-full h-4 mb-4 overflow-hidden">
                                    <div className="bg-white h-full rounded-full transition-all duration-1000" style={{ width: `${stats.percentage}%` }}></div>
                                </div>
                                <div className="grid grid-cols-2 gap-4 text-center">
                                    <div className="bg-white/5 p-2 rounded-xl text-xs font-black">{stats.surahsCompleted} / 114 Surah</div>
                                    <div className="bg-white/5 p-2 rounded-xl text-xs font-black">{stats.juzCompleted} / 30 Juz</div>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="px-5 -mt-8 relative z-10 space-y-6">
                        {/* Target Section */}
                        <section className="bg-white rounded-[2rem] shadow-xl p-6 border border-slate-100">
                           <div className="flex items-center justify-between mb-4">
                              <span className="text-emerald-600 font-black text-[11px] uppercase tracking-wider">🎯 Target Hari Ini</span>
                              {targetJuz && <button onClick={() => setTargetJuz(null)} className="text-[10px] font-black text-slate-400">GANTI</button>}
                           </div>
                           {!targetJuz ? (
                                <select className="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 text-sm font-black appearance-none"
                                    onChange={(e) => { setTargetJuz(e.target.value); setDailyStartVerses(currentTotalVerses); }}
                                    defaultValue=""
                                >
                                    <option value="" disabled>Mau sampai mana hari ini?</option>
                                    {JUZ_LIST.map(j => <option key={j.number} value={j.number}>Mencapai Juz {j.number}</option>)}
                                    <option value="31">👑 Selesai Khatam</option>
                                </select>
                           ) : (
                                <div>
                                    <div className="flex justify-between items-end mb-2">
                                        <span className="text-xs font-black">{targetStats.targetLabel}</span>
                                        <span className="text-emerald-600 font-black text-2xl">{targetStats.percentage}%</span>
                                    </div>
                                    <div className="w-full bg-slate-100 rounded-full h-4 overflow-hidden mb-3">
                                        <div className="bg-emerald-500 h-full rounded-full transition-all duration-700" style={{ width: `${targetStats.percentage}%` }}></div>
                                    </div>
                                    <p className="text-[10px] font-black text-slate-400">{targetStats.versesReadToday} / {targetStats.versesToReadToday} Ayat</p>
                                </div>
                           )}
                        </section>

                        {/* Fitur Terakhir Dibaca (Last Read) yang Hilang */}
                        {lastRead && viewMode === 'surah' && !searchTerm && (
                            <div className="bg-gradient-to-br from-emerald-500 to-emerald-700 p-6 rounded-[2.5rem] shadow-2xl border border-emerald-400/30 text-white animate-in slide-in-from-top-4">
                                <div className="flex items-center gap-2 mb-4">
                                    <div className="p-2 bg-white/20 rounded-xl backdrop-blur-md"><Icon name="refresh-cw" size={14} className="animate-spin-slow" /></div>
                                    <span className="text-[10px] font-black uppercase tracking-[0.2em] opacity-80">Terakhir Dibaca</span>
                                </div>
                                {(() => {
                                    const s = SURAH_DATA.find(x => x.number === lastRead);
                                    const current = progress[s.number] || 0;
                                    return (
                                        <div className="flex justify-between items-center">
                                            <div>
                                                <h3 className="font-black text-2xl leading-tight tracking-tight">{s.name}</h3>
                                                <p className="text-emerald-100 text-[11px] font-black mt-1 tabular-nums bg-black/10 inline-block px-3 py-1 rounded-full uppercase tracking-widest">Ayat {current} / {s.verses}</p>
                                            </div>
                                            <button 
                                                onClick={() => {
                                                    const el = document.getElementById(`surah-${s.number}`);
                                                    if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                                }}
                                                className="bg-white text-emerald-700 p-4 rounded-2xl shadow-xl active:scale-90 transition-transform"
                                            >
                                                <Icon name="chevron-right" size={24} />
                                            </button>
                                        </div>
                                    )
                                })()}
                            </div>
                        )}

                        {/* Search & Tabs */}
                        <div className="sticky top-4 z-40 space-y-3">
                            <div className="bg-white/80 backdrop-blur-xl rounded-2xl shadow-xl p-1.5 flex gap-1 border border-white">
                                <button onClick={() => {setViewMode('surah'); scrollToTop();}} className={`flex-1 py-3 rounded-xl text-[10px] font-black transition-all ${viewMode === 'surah' ? 'bg-emerald-600 text-white' : 'text-slate-500'}`}>SURAH</button>
                                <button onClick={() => {setViewMode('juz'); scrollToTop();}} className={`flex-1 py-3 rounded-xl text-[10px] font-black transition-all ${viewMode === 'juz' ? 'bg-emerald-600 text-white' : 'text-slate-500'}`}>JUZ</button>
                                <button onClick={() => setViewMode('settings')} className={`flex-1 py-3 rounded-xl text-[10px] font-black transition-all ${viewMode === 'settings' ? 'bg-emerald-600 text-white' : 'text-slate-500'}`}>MENU</button>
                            </div>
                            {viewMode !== 'settings' && (
                                <div className="bg-white/90 rounded-2xl shadow-lg p-4 border border-slate-100">
                                    <input type="text" placeholder="Cari..." className="w-full bg-transparent outline-none font-black text-sm" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                </div>
                            )}
                        </div>

                        {/* List Area */}
                        {viewMode === 'surah' && filteredSurahs.map(surah => {
                            const cur = progress[surah.number] || 0;
                            const comp = cur === surah.verses;
                            return (
                                <div key={surah.number} id={`surah-${surah.number}`} className={`bg-white rounded-[2.5rem] p-6 border-2 transition-all ${comp ? 'border-emerald-500 bg-emerald-50/20' : 'border-slate-100'}`}>
                                    <div className="flex justify-between items-start mb-6">
                                        <div className="flex items-center gap-4">
                                            <div className={`w-12 h-12 rounded-2xl flex items-center justify-center font-black ${comp ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}`}>{surah.number}</div>
                                            <div>
                                                <h3 className="font-black text-lg">{surah.name}</h3>
                                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{surah.verses} Ayat • Juz {getJuzForVerse(surah.number, cur)}</p>
                                            </div>
                                        </div>
                                        <button onClick={() => toggleComplete(surah.number)} className={comp ? 'text-emerald-500' : 'text-slate-200'}>
                                            <Icon name={comp ? "check-circle" : "circle"} size={36} />
                                        </button>
                                    </div>
                                    <div className="bg-slate-50 p-5 rounded-3xl border border-slate-100">
                                        <div className="flex justify-between text-[10px] font-black text-slate-400 uppercase mb-3"><span>Progress</span><span>{Math.round((cur/surah.verses)*100)}%</span></div>
                                        <div className="h-3 bg-slate-200 rounded-full overflow-hidden mb-5"><div className="bg-emerald-500 h-full" style={{ width: `${(cur/surah.verses)*100}%` }}></div></div>
                                        <div className="flex items-center gap-2">
                                            <button onClick={() => updateVerse(surah.number, cur - 1)} className="w-14 h-14 bg-white border-2 border-slate-100 rounded-2xl font-black text-2xl shadow-sm">-</button>
                                            <div className="flex-1 relative">
                                                <input type="number" className="w-full text-center font-black text-2xl bg-white border-2 border-slate-100 rounded-2xl py-3" value={cur === 0 ? '' : cur} placeholder="0" onChange={e => updateVerse(surah.number, parseInt(e.target.value) || 0)} />
                                                <span className="absolute -bottom-2.5 left-1/2 -translate-x-1/2 text-[8px] font-black text-slate-400 uppercase bg-white px-2 rounded-full border border-slate-100">Ayat</span>
                                            </div>
                                            <button onClick={() => updateVerse(surah.number, cur + 1)} className="w-14 h-14 bg-emerald-600 text-white rounded-2xl font-black text-2xl shadow-xl">+</button>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}

                        {viewMode === 'juz' && filteredJuz.map(juz => {
                            const comp = isJuzComplete(juz.number, progress);
                            return (
                                <div key={juz.number} onClick={() => toggleJuz(juz.number)} className={`bg-white rounded-[2rem] p-6 border-2 flex items-center justify-between ${comp ? 'border-emerald-500 bg-emerald-50/20' : 'border-slate-100'}`}>
                                    <div className="flex items-center gap-4">
                                        <div className={`w-14 h-14 rounded-2xl flex items-center justify-center font-black text-xl ${comp ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}`}>{juz.number}</div>
                                        <div><h3 className="font-black text-lg">Juz {juz.number}</h3><p className="text-[10px] font-black text-slate-400 uppercase leading-none mt-1">{juz.start}</p></div>
                                    </div>
                                    <div className={comp ? 'text-emerald-500' : 'text-slate-200'}><Icon name={comp ? "check-circle" : "circle"} size={36} /></div>
                                </div>
                            );
                        })}

                        {viewMode === 'settings' && (
                            <div className="space-y-6">
                                <div className="bg-white rounded-[2rem] p-8 shadow-xl border border-slate-100 text-center">
                                    <div className="inline-flex bg-emerald-100 text-emerald-600 p-4 rounded-3xl mb-4"><Icon name="trophy" size={32} /></div>
                                    <h3 className="font-black text-xl mb-1">Total Khatam: {khatamCount}x</h3>
                                    <p className="text-xs text-slate-400 font-bold uppercase tracking-widest">Barakallahfikum</p>
                                    <button onClick={() => {setProgress({}); setKhatamCount(p => p + 1); setViewMode('surah'); scrollToTop();}} className="w-full mt-6 bg-amber-500 text-white font-black py-4 rounded-2xl shadow-xl">CATAT KHATAM & RESET</button>
                                </div>
                                <div className="bg-white rounded-[2rem] p-6 shadow-xl border border-slate-100 space-y-4">
                                    <div className="flex justify-between items-center py-2 border-b border-slate-50"><span className="text-xs font-bold text-slate-500">Versi</span><span className="text-xs font-black">2.5.0-PWA</span></div>
                                    <div className="flex justify-between items-center py-2 border-b border-slate-50"><span className="text-xs font-bold text-slate-500">Dev</span><span className="text-xs font-black">Arief x Gemini</span></div>
                                </div>
                            </div>
                        )}
                    </main>

                    {showScrollTop && (
                        <button onClick={scrollToTop} className="fixed bottom-10 right-6 bg-emerald-600 text-white p-4 rounded-2xl shadow-2xl z-50 animate-in slide-in-from-bottom-4">
                            <Icon name="arrow-up" size={24} />
                        </button>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

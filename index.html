            if (s) total += s.verses;
          }
          total += verseNum;
          return total;
        };

          let v = verseNum === 0 ? 1 : verseNum;
          for (let i = 0; i < JUZ_START.length; i++) {
            const curr = JUZ_START[i];
            const next = JUZ_START[i + 1];
            if (!next) return 30;
            if (surahNum < next.s || (surahNum === next.s && v < next.v)) return curr.juz;
          }
          return 30;
        };

        const getJuzSegments = (juzNum) => {
          const startMarker = JUZ_START.find(j => j.juz === juzNum);
          const endMarker = juzNum === 30 ? null : JUZ_START.find(j => j.juz === juzNum + 1);
          const segments = [];
          let currentSurah = startMarker.s;
          let currentVerse = startMarker.v;
          while (true) {
            const surahInfo = SURAH_DATA.find(s => s.number === currentSurah);
            if (!surahInfo) break;
            const maxVerse = surahInfo.verses;
            if (endMarker && currentSurah === endMarker.s) {
              segments.push({ s: currentSurah, start: currentVerse, end: endMarker.v - 1 });
              break;
            } else {
              segments.push({ s: currentSurah, start: currentVerse, end: maxVerse });
              if (!endMarker && currentSurah === 114) break;
              currentSurah++;
              currentVerse = 1;
            }
          }
          return segments;
        };

          const segments = getJuzSegments(juzNum);
          return segments.every(seg => (progressObj[seg.s] || 0) >= seg.end);

            const [dailyStartVerses, setDailyStartVerses] = useState(() => parseInt(loadLocal('quran-daily-start', 0)) || 0);
            const [targetDate, setTargetDate] = useState(() => loadLocal('quran-target-date', new Date().toLocaleDateString('en-CA')));

            // Ref untuk akses nilai terkini tanpa stale closure
            const dailyStartRef = useRef(dailyStartVerses);
            const targetDateRef = useRef(targetDate);
            const lastActiveDateRef = useRef(lastActiveDate);

            useEffect(() => { dailyStartRef.current = dailyStartVerses; }, [dailyStartVerses]);
            useEffect(() => { targetDateRef.current = targetDate; }, [targetDate]);
            useEffect(() => { lastActiveDateRef.current = lastActiveDate; }, [lastActiveDate]);

            // Dark mode effect
            useEffect(() => {
                document.documentElement.classList.toggle('dark', isDark);
                saveLocal('quran-dark', isDark);
            }, [isDark]);

            // Persist all state
            useEffect(() => { saveLocal('quran-progress', progress); }, [progress]);
            useEffect(() => { if (lastRead !== null) saveLocal('quran-last-read', lastRead); }, [lastRead]);
            useEffect(() => { saveLocal('quran-streak', streak); }, [streak]);
            useEffect(() => { if (lastActiveDate) saveLocal('quran-last-date', lastActiveDate); }, [lastActiveDate]);
            useEffect(() => { saveLocal('quran-khatam', khatamCount); }, [khatamCount]);
            useEffect(() => {
                if (targetJuz) saveLocal('quran-target-juz', targetJuz);
                else removeLocal('quran-target-juz');
            }, [targetJuz]);
            useEffect(() => { saveLocal('quran-daily-start', dailyStartVerses); }, [dailyStartVerses]);
            useEffect(() => { saveLocal('quran-target-date', targetDate); }, [targetDate]);

            // Scroll top button
            useEffect(() => {
                const handleScroll = () => setShowScrollTop(window.scrollY > 300);
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });

            const currentTotalVerses = useMemo(() => {
                let total = 0;
                SURAH_DATA.forEach(s => { total += progress[s.number] || 0; });
                return total;
            }, [progress]);

            // FIX #2: recordActivity menggunakan ref + menerima newTotal sebagai parameter
            // agar tidak bergantung pada stale closure currentTotalVerses
            const recordActivity = useCallback((newTotal) => {
                const today = new Date().toLocaleDateString('en-CA');
                const storedDate = lastActiveDateRef.current;

                if (storedDate !== today) {
                    if (storedDate) {
                        const lastDate = new Date(storedDate);
                        const currentDate = new Date(today);
                        const diffDays = Math.ceil(Math.abs(currentDate - lastDate) / (1000 * 60 * 60 * 24));
                        setStreak(prev => diffDays === 1 ? prev + 1 : 1);
                    } else {
                        setStreak(1);
                    }
                    setLastActiveDate(today);
                }

                // FIX: Reset daily start jika hari baru, gunakan newTotal yang akurat
                if (targetDateRef.current !== today) {
                    setTargetDate(today);
                    setDailyStartVerses(newTotal);
                }
            }, []);

            const targetStats = useMemo(() => {
                if (!targetJuz) return null;
                let targetTotalVerses;
                let targetLabel;
                if (parseInt(targetJuz) === 31) {
                    targetTotalVerses = 6236;
                    targetLabel = "Khatam";
                } else {
                    const juzInfo = JUZ_START.find(j => j.juz === parseInt(targetJuz));
                    if (!juzInfo) return null;
                    targetTotalVerses = getAbsoluteVerseCount(juzInfo.s, juzInfo.v - 1);
                    targetLabel = `Awal Juz ${targetJuz}`;
                }
                const versesReadToday = Math.max(0, currentTotalVerses - dailyStartVerses);
                const versesToReadToday = Math.max(1, targetTotalVerses - dailyStartVerses);
                const isReached = currentTotalVerses >= targetTotalVerses;
                const percentage = isReached ? 100 : Math.min(100, Math.round((versesReadToday / versesToReadToday) * 100));
                return { targetLabel, versesReadToday, versesToReadToday, percentage, isReached };
            }, [targetJuz, currentTotalVerses, dailyStartVerses]);

            const stats = useMemo(() => {
                let surahsCompleted = 0;
                SURAH_DATA.forEach(surah => {
                    if ((progress[surah.number] || 0) === surah.verses) surahsCompleted++;
                });
                let juzCompleted = 0;
                for (let i = 1; i <= 30; i++) {
                    if (isJuzComplete(i, progress)) juzCompleted++;
                }
                const percentage = Math.round((currentTotalVerses / 6236) * 100);
                return { percentage, surahsCompleted, juzCompleted, isKhatam: currentTotalVerses >= 6236 };
            }, [progress, currentTotalVerses]);

            // FIX #3: Auto-detect khatam dan increment khatamCount
            const prevTotalRef = useRef(currentTotalVerses);
            useEffect(() => {
                const prev = prevTotalRef.current;
                const curr = currentTotalVerses;
                prevTotalRef.current = curr;
                // Jika sebelumnya belum 6236 dan sekarang sudah, berarti baru khatam
                if (prev < 6236 && curr >= 6236) {
                    setKhatamCount(c => c + 1);
                    setShowKhatamModal(true);
                }
            }, [currentTotalVerses]);

            const updateVerse = useCallback((surahNumber, verse) => {
                const surah = SURAH_DATA.find(s => s.number === surahNumber);
                const newVerse = Math.max(0, Math.min(verse, surah.verses));

                // Hitung newTotal secara langsung sebelum setState agar recordActivity akurat
                let newTotal = 0;
                SURAH_DATA.forEach(s => {
                    newTotal += s.number === surahNumber ? newVerse : (progress[s.number] || 0);
                });

                recordActivity(newTotal);
                setProgress(prev => ({ ...prev, [surahNumber]: newVerse }));
                setLastRead(surahNumber);
            }, [progress, recordActivity]);

            const toggleComplete = useCallback((surahNumber) => {
                const surah = SURAH_DATA.find(s => s.number === surahNumber);
                const currentVerse = progress[surah.number] || 0;
                updateVerse(surah.number, currentVerse === surah.verses ? 0 : surah.verses);
            }, [progress, updateVerse]);

            // FIX #4: toggleJuz — Math.max(0, ...) untuk cegah nilai negatif
            const toggleJuz = useCallback((juzNumber) => {
                const segments = getJuzSegments(juzNumber);
                const completed = isJuzComplete(juzNumber, progress);

                // Hitung newTotal secara langsung
                const nextProgress = { ...progress };
                segments.forEach(seg => {
                    if (completed) {
                        // Reset ke sebelum segmen ini mulai, minimal 0
                        nextProgress[seg.s] = Math.max(0, seg.start - 1);
                    } else {
                        nextProgress[seg.s] = Math.max(nextProgress[seg.s] || 0, seg.end);
                    }
                });

                let newTotal = 0;
                SURAH_DATA.forEach(s => { newTotal += nextProgress[s.number] || 0; });

                recordActivity(newTotal);
                setProgress(nextProgress);
                setLastRead(segments[segments.length - 1].s);
            }, [progress, recordActivity]);

            // --- Backup & Restore ---
            const exportData = () => {
                const data = {
                    progress, lastRead, streak, lastActiveDate, khatamCount,
                    targetJuz, dailyStartVerses, targetDate, isDark
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `jurnal-quran-arief-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            // FIX #5: importData — restore SEMUA field termasuk yang sebelumnya diabaikan
            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (window.confirm("Ganti data saat ini dengan data cadangan?")) {
                            if (data.progress !== undefined) setProgress(data.progress);
                            if (data.lastRead !== undefined) setLastRead(data.lastRead);
                            if (data.streak !== undefined) setStreak(parseInt(data.streak) || 0);
                            if (data.lastActiveDate !== undefined) setLastActiveDate(data.lastActiveDate);
                            if (data.khatamCount !== undefined) setKhatamCount(parseInt(data.khatamCount) || 0);
                            if (data.targetJuz !== undefined) setTargetJuz(data.targetJuz);
                            if (data.dailyStartVerses !== undefined) setDailyStartVerses(parseInt(data.dailyStartVerses) || 0);
                            if (data.targetDate !== undefined) setTargetDate(data.targetDate);
                            if (data.isDark !== undefined) setIsDark(data.isDark);
                            alert("✅ Data berhasil dipulihkan!");
                        }
                    } catch (err) {
                        alert("❌ File tidak valid atau rusak.");
                    }
                };
                reader.readAsText(file);
                // Reset input agar bisa import file yang sama lagi
                e.target.value = '';
            };

            const filteredSurahs = useMemo(() =>
                SURAH_DATA.filter(s =>
                    s.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    s.number.toString() === searchTerm
                ), [searchTerm]);

            const filteredJuz = useMemo(() =>
                JUZ_LIST.filter(j => j.number.toString().includes(searchTerm)),
                [searchTerm]);

            return (
                <div className="pb-32 dark:text-slate-100">
                    {showKhatamModal && (
                        <KhatamModal
                            count={khatamCount}
                            onClose={() => {
                                setShowKhatamModal(false);
                                // Reset progress untuk putaran berikutnya
                                if (window.confirm("Mulai putaran baru? Progress akan direset.")) {
                                    setProgress({});
                                    setLastRead(null);
                                }
                            }}
                        />
                    )}

                    <header className="bg-emerald-600 dark:bg-emerald-900 text-white pb-14 px-5 rounded-b-[3rem] shadow-xl relative overflow-hidden transition-colors">
                        <div className="relative z-10">
                            <div className="flex justify-between items-center mb-6">
                                <div>
                                    <h1 className="text-2xl font-black tracking-tight">Jurnal Quran</h1>
                                    <p className="text-emerald-100 text-[11px] font-bold uppercase tracking-widest opacity-90">Progress Baca Quran</p>
                                </div>
                                <div className="flex gap-2 items-center">
                                    <button onClick={() => setIsDark(!isDark)} className="p-2 bg-white/10 rounded-xl mr-1">
                                        <Icon name={isDark ? "sun" : "moon"} size={18} />
                                    </button>
                                    {streak > 0 && <div className="bg-white/20 px-3 py-1.5 rounded-full text-[15px] font-black tabular-nums">🔥 {streak}d</div>}
                                    {khatamCount > 0 && <div className="bg-white/20 px-3 py-1.5 rounded-full text-[10px] font-black tabular-nums">🏆 {khatamCount}x</div>}
                                </div>
                            </div>
                            <div className="bg-white/10 backdrop-blur-xl rounded-3xl p-6 border border-white/20 shadow-2xl">
                                <div className="flex justify-between items-baseline mb-4">
                                    <span className="text-[10px] font-black uppercase text-emerald-100 opacity-80 tracking-widest">Total Progress</span>
                                    <span className="text-5xl font-black tabular-nums">{stats.percentage}%</span>
                                </div>
                                <div className="w-full bg-black/10 rounded-full h-4 mb-4 overflow-hidden shadow-inner">
                                    <div className="bg-white h-full rounded-full transition-all duration-1000 shadow-[0_0_15px_rgba(255,255,255,0.7)]" style={{ width: `${stats.percentage}%` }}></div>
                                </div>
                                <div className="grid grid-cols-2 gap-4 text-center">
                                    <div className="bg-white/5 p-2 rounded-xl text-[10px] font-black uppercase tracking-widest">{stats.surahsCompleted} / 114 Surah</div>
                                    <div className="bg-white/5 p-2 rounded-xl text-[10px] font-black uppercase tracking-widest">{stats.juzCompleted} / 30 Juz</div>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="px-5 -mt-8 relative z-10 space-y-6">
                        {/* Target Section */}
                        <section className="bg-white dark:bg-slate-900 rounded-[2rem] shadow-xl p-6 border border-slate-100 dark:border-slate-800 transition-colors">
                           <div className="flex items-center justify-between mb-4">
                              <span className="text-emerald-600 dark:text-emerald-400 font-black text-[11px] uppercase tracking-widest flex items-center gap-2">
                                <Icon name="target" size={16} /> Target Hari Ini
                              </span>
                              {targetJuz && <button onClick={() => setTargetJuz(null)} className="text-[10px] font-black text-slate-400 dark:text-slate-500 border border-slate-100 dark:border-slate-800 px-3 py-1 rounded-full">GANTI</button>}
                           </div>
                           {!targetJuz ? (
                                <div className="relative">
                                    <select className="w-full bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl p-4 text-sm font-black appearance-none outline-none focus:border-emerald-500 transition-colors dark:text-slate-200"
                                        onChange={(e) => {
                                            setTargetJuz(e.target.value);
                                            // FIX: gunakan currentTotalVerses yang sudah akurat saat ini
                                            setDailyStartVerses(currentTotalVerses);
                                            setTargetDate(new Date().toLocaleDateString('en-CA'));
                                        }}
                                        defaultValue=""
                                    >
                                        <option value="" disabled>Mau sampai mana hari ini?</option>
                                        {JUZ_LIST.map(j => <option key={j.number} value={j.number}>Mencapai Juz {j.number}</option>)}
                                        <option value="31">👑 Selesai Khatam</option>
                                    </select>
                                    <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-emerald-500"><Icon name="chevron-down" size={18} /></div>
                                </div>
                           ) : (
                                <div>
                                    <div className="flex justify-between items-end mb-2">
                                        <span className="text-xs font-black uppercase tracking-tight text-slate-600 dark:text-slate-400">{targetStats?.targetLabel}</span>
                                        <span className="text-emerald-600 dark:text-emerald-400 font-black text-2xl tabular-nums">{targetStats?.percentage ?? 0}%</span>
                                    </div>
                                    <div className="w-full bg-slate-100 dark:bg-slate-800 rounded-full h-4 overflow-hidden mb-3 border border-slate-200 dark:border-slate-700 shadow-inner">
                                        <div className="bg-emerald-500 h-full rounded-full transition-all duration-700 shadow-[0_0_10px_rgba(16,185,129,0.3)]" style={{ width: `${targetStats?.percentage ?? 0}%` }}></div>
                                    </div>
                                    <div className="flex justify-between text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest tabular-nums">
                                        <span>{targetStats?.versesReadToday ?? 0} / {targetStats?.versesToReadToday ?? 0} Ayat</span>
                                        <span className="text-emerald-500">{targetStats?.isReached ? "✅ Target Tercapai!" : "Semangat Istiqomah!"}</span>
                                    </div>
                                </div>
                           )}
                        </section>

                        {/* Terakhir Dibaca */}
                        {lastRead && viewMode === 'surah' && !searchTerm && (
                            <div className="bg-gradient-to-br from-emerald-500 to-emerald-700 p-6 rounded-[2.5rem] shadow-2xl border border-emerald-400/30 text-white">
                                <div className="flex items-center gap-2 mb-4">
                                    <div className="p-2 bg-white/20 rounded-xl backdrop-blur-md"><Icon name="refresh-cw" size={14} className="animate-spin-slow" /></div>
                                    <span className="text-[10px] font-black uppercase tracking-[0.2em] opacity-80">Terakhir Dibaca</span>
                                </div>
                                {(() => {
                                    const s = SURAH_DATA.find(x => x.number === lastRead);
                                    if (!s) return null;
                                    const current = progress[s.number] || 0;
                                    return (
                                        <div className="flex justify-between items-center">
                                            <div>
                                                <h3 className="font-black text-2xl leading-tight tracking-tight">{s.name}</h3>
                                                <p className="text-emerald-100 text-[11px] font-black mt-1 tabular-nums bg-black/10 inline-block px-3 py-1 rounded-full uppercase tracking-widest">Ayat {current} / {s.verses}</p>
                                            </div>
                                            <button
                                                onClick={() => {
                                                    const el = document.getElementById(`surah-${s.number}`);
                                                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                                }}
                                                className="bg-white text-emerald-700 p-4 rounded-2xl shadow-xl active:scale-90 transition-transform"
                                            >
                                                <Icon name="chevron-right" size={24} strokeWidth={3} />
                                            </button>
                                        </div>
                                    );
                                })()}
                            </div>
                        )}

                        {/* Search & Tabs */}
                        <div className="sticky top-4 z-40 space-y-3">
                            <div className="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl rounded-[1.5rem] shadow-xl p-1.5 flex gap-1 border border-white dark:border-slate-800">
                                <button onClick={() => { setViewMode('surah'); scrollToTop(); }} className={`flex-1 py-3.5 rounded-xl text-[10px] font-black transition-all ${viewMode === 'surah' ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800'}`}>SURAH</button>
                                <button onClick={() => { setViewMode('juz'); scrollToTop(); }} className={`flex-1 py-3.5 rounded-xl text-[10px] font-black transition-all ${viewMode === 'juz' ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800'}`}>JUZ</button>
                                <button onClick={() => { setViewMode('settings'); scrollToTop(); }} className={`flex-1 py-3.5 rounded-xl text-[10px] font-black transition-all ${viewMode === 'settings' ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800'}`}>MENU</button>
                            </div>
                            {viewMode !== 'settings' && (
                                <div className="bg-white/90 dark:bg-slate-900/90 backdrop-blur-2xl rounded-[1.2rem] shadow-lg p-4 border border-slate-100 dark:border-slate-800 flex items-center gap-3">
                                    <Icon name="search" size={18} className="text-slate-300 dark:text-slate-600" strokeWidth={3} />
                                    <input type="text" placeholder="Cari surah atau nomor..." className="w-full bg-transparent outline-none font-black text-sm text-slate-800 dark:text-slate-200 placeholder:text-slate-300" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                    {searchTerm && <button onClick={() => setSearchTerm('')} className="text-slate-300 font-black text-lg leading-none">×</button>}
                                </div>
                            )}
                        </div>

                        {/* Surah List */}
                        {viewMode === 'surah' && filteredSurahs.map(surah => {
                            const cur = progress[surah.number] || 0;
                            const comp = cur === surah.verses;
                            return (
                                <div key={surah.number} id={`surah-${surah.number}`} className={`bg-white dark:bg-slate-900 rounded-[2.5rem] p-6 border-2 transition-all duration-300 ${comp ? 'border-emerald-500 bg-emerald-50/20 dark:bg-emerald-950/20' : 'border-slate-100 dark:border-slate-800'}`}>
                                    <div className="flex justify-between items-start mb-6">
                                        <div className="flex items-center gap-4">
                                            <div className={`w-14 h-14 rounded-2xl flex items-center justify-center font-black text-xl shadow-inner ${comp ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900 dark:text-emerald-200' : 'bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400'}`}>{surah.number}</div>
                                            <div>
                                                <h3 className="font-black text-lg tracking-tight">{surah.name}</h3>
                                                <p className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest tabular-nums">{surah.verses} Ayat • Juz {getJuzForVerse(surah.number, cur)}</p>
                                            </div>
                                        </div>
                                        <button onClick={() => toggleComplete(surah.number)} className={`transition-all active:scale-75 ${comp ? 'text-emerald-500' : 'text-slate-200 dark:text-slate-700'}`}>
                                            <Icon name={comp ? "check-circle" : "circle"} size={36} strokeWidth={comp ? 0 : 1.5} className={comp ? "fill-current" : ""} />
                                        </button>
                                    </div>
                                    <div className="bg-slate-50 dark:bg-slate-800/50 p-5 rounded-3xl border border-slate-100 dark:border-slate-800">
                                        <div className="flex justify-between text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-3 tabular-nums">
                                            <span>Progress</span>
                                            <span>{Math.round((cur / surah.verses) * 100)}%</span>
                                        </div>
                                        <div className="h-4 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden mb-6 border border-white dark:border-slate-900 shadow-inner">
                                            <div className="bg-emerald-500 h-full rounded-full transition-all duration-500 shadow-[0_0_10px_rgba(16,185,129,0.3)]" style={{ width: `${(cur / surah.verses) * 100}%` }}></div>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <button onClick={() => updateVerse(surah.number, cur - 1)} className="w-16 h-16 bg-white dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl font-black text-3xl text-slate-300 dark:text-slate-600 active:bg-slate-100 dark:active:bg-slate-700 active:scale-90 transition-all select-none shadow-sm">-</button>
                                            <div className="flex-1 relative">
                                                <input
                                                    type="number"
                                                    inputMode="numeric"
                                                    className="w-full text-center font-black text-2xl bg-white dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl py-4 outline-none focus:border-emerald-500 transition-colors tabular-nums dark:text-slate-200"
                                                    value={cur === 0 ? '' : cur}
                                                    placeholder="0"
                                                    onChange={e => updateVerse(surah.number, parseInt(e.target.value) || 0)}
                                                />
                                                <span className="absolute -bottom-2.5 left-1/2 -translate-x-1/2 text-[9px] font-black text-slate-400 dark:text-slate-500 uppercase bg-white dark:bg-slate-800 px-3 tracking-widest rounded-full border border-slate-100 dark:border-slate-700 shadow-sm">Ayat</span>
                                            </div>
                                            <button onClick={() => updateVerse(surah.number, cur + 1)} className="w-16 h-16 bg-emerald-600 text-white rounded-2xl font-black text-3xl active:bg-emerald-700 active:scale-90 transition-all select-none shadow-lg shadow-emerald-200">+</button>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}

                        {/* Juz List */}
                        {viewMode === 'juz' && filteredJuz.map(juz => {
                            const comp = isJuzComplete(juz.number, progress);
                            return (
                                <div key={juz.number} onClick={() => toggleJuz(juz.number)} className={`bg-white dark:bg-slate-900 rounded-[2rem] p-6 border-2 flex items-center justify-between active:scale-[0.98] transition-all ${comp ? 'border-emerald-500 bg-emerald-50/20 dark:bg-emerald-950/20' : 'border-slate-100 dark:border-slate-800'}`}>
                                    <div className="flex items-center gap-5">
                                        <div className={`w-16 h-16 rounded-2xl flex items-center justify-center font-black text-2xl shadow-inner ${comp ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900 dark:text-emerald-200' : 'bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400'}`}>{juz.number}</div>
                                        <div>
                                            <h3 className="font-black text-xl tracking-tight">Juz {juz.number}</h3>
                                            <p className="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-tighter mt-1">{juz.start}</p>
                                        </div>
                                    </div>
                                    <div className={`transition-all ${comp ? 'text-emerald-500 scale-110' : 'text-slate-100 dark:text-slate-700'}`}>
                                        <Icon name={comp ? "check-circle" : "circle"} size={40} className={comp ? "fill-current" : ""} />
                                    </div>
                                </div>
                            );
                        })}

                        {/* Settings */}
                        {viewMode === 'settings' && (
                            <div className="space-y-6 pb-12">
                                <div className="bg-white dark:bg-slate-900 rounded-[2.5rem] p-8 shadow-2xl border border-slate-100 dark:border-slate-800 text-center">
                                    <div className="inline-flex bg-emerald-100 dark:bg-emerald-900 text-emerald-600 dark:text-emerald-200 p-6 rounded-[2rem] mb-6 shadow-inner animate-bounce-subtle">
                                        <Icon name="trophy" size={40} />
                                    </div>
                                    <h3 className="font-black text-2xl mb-1 tracking-tight tabular-nums">Total Khatam: {khatamCount}x</h3>
                                    <p className="text-xs text-slate-400 font-bold uppercase tracking-[0.2em] mb-8">Barakallahfikum!</p>

                                    <div className="grid grid-cols-2 gap-3 mt-4">
                                        <button onClick={exportData} className="flex items-center justify-center gap-2 bg-slate-100 dark:bg-slate-800 p-4 rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-600 dark:text-slate-300 shadow-sm active:scale-95 transition-transform">
                                            <Icon name="download" size={14} /> Cadangkan
                                        </button>
                                        <label className="flex items-center justify-center gap-2 bg-slate-100 dark:bg-slate-800 p-4 rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-600 dark:text-slate-300 shadow-sm cursor-pointer active:scale-95 transition-transform">
                                            <Icon name="upload" size={14} /> Pulihkan
                                            <input type="file" accept=".json" onChange={importData} className="hidden" />
                                        </label>
                                    </div>

                                    <button
                                        onClick={() => {
                                            if (window.confirm("Hapus seluruh progres dan mulai dari nol?")) {
                                                setProgress({});
                                                setKhatamCount(0);
                                                setStreak(0);
                                                setLastRead(null);
                                                setLastActiveDate(null);
                                                setTargetJuz(null);
                                                setDailyStartVerses(0);
                                                alert("✅ Data dibersihkan.");
                                            }
                                        }}
                                        className="w-full mt-6 bg-red-50 dark:bg-red-950/30 text-red-500 font-black py-4 rounded-2xl text-[10px] uppercase tracking-[0.2em] flex items-center justify-center gap-2 active:scale-95 transition-transform"
                                    >
                                        <Icon name="trash" size={14} /> Hapus Seluruh Data
                                    </button>
                                </div>

                                <div className="bg-white dark:bg-slate-900 rounded-[2rem] p-6 shadow-xl border border-slate-100 dark:border-slate-800 space-y-4">
                                    <div className="flex justify-between items-center py-2 border-b border-slate-50 dark:border-slate-800">
                                        <span className="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Tampilan</span>
                                        <button onClick={() => setIsDark(!isDark)} className="text-xs font-black text-slate-800 dark:text-slate-200 bg-slate-50 dark:bg-slate-800 px-4 py-1.5 rounded-full uppercase tracking-widest flex items-center gap-2">
                                            <Icon name={isDark ? "sun" : "moon"} size={14} /> {isDark ? "Mode Terang" : "Mode Gelap"}
                                        </button>
                                    </div>
                                    <div className="flex justify-between items-center py-2 border-b border-slate-50 dark:border-slate-800">
                                        <span className="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Versi</span>
                                        <span className="text-xs font-black text-slate-800 dark:text-slate-200 bg-slate-50 dark:bg-slate-800 px-3 py-1 rounded-full uppercase tracking-widest">2.9.0-Fix</span>
                                    </div>
                                    <div className="flex justify-between items-center py-2 border-b border-slate-50 dark:border-slate-800">
                                        <span className="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Penyimpanan</span>
                                        <span className="text-xs font-black text-emerald-600 uppercase tracking-widest">Lokal + Backup</span>
                                    </div>
                                    <div className="flex justify-between items-center py-2">
                                        <span className="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Total Ayat Dibaca</span>
                                        <span className="text-xs font-black text-emerald-600 uppercase tracking-widest tabular-nums">{currentTotalVerses} / 6236</span>
                                    </div>
                                </div>
                                <p className="text-center text-[9px] font-black text-slate-300 dark:text-slate-700 uppercase tracking-[0.3em] mt-10">Jurnal Quran by Arief • v2.9.0</p>
                            </div>
                        )}
                    </main>

                    {showScrollTop && (
                        <button onClick={scrollToTop} className="fixed bottom-28 right-6 bg-emerald-600 text-white p-5 rounded-[1.5rem] shadow-2xl z-50 active:scale-75 transition-all">
                            <Icon name="arrow-up" size={24} strokeWidth={3} />
                        </button>
                    )}

                    <nav className="bottom-nav fixed bottom-0 left-0 right-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-3xl border-t border-slate-50 dark:border-slate-800 flex items-center justify-around px-8 z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] transition-colors">
                        <button onClick={() => { setViewMode('surah'); scrollToTop(); }} className={`flex flex-col items-center gap-1.5 transition-all ${viewMode === 'surah' ? 'text-emerald-600 scale-110' : 'text-slate-300 dark:text-slate-600'}`}>
                            <div className={`p-1.5 rounded-xl ${viewMode === 'surah' ? 'bg-emerald-50 dark:bg-emerald-900/30' : ''}`}><Icon name="list" size={22} strokeWidth={viewMode === 'surah' ? 3 : 2} /></div>
                            <span className="text-[9px] font-black uppercase tracking-widest">Surah</span>
                        </button>
                        <button onClick={() => { setViewMode('juz'); scrollToTop(); }} className={`flex flex-col items-center gap-1.5 transition-all ${viewMode === 'juz' ? 'text-emerald-600 scale-110' : 'text-slate-300 dark:text-slate-600'}`}>
                            <div className={`p-1.5 rounded-xl ${viewMode === 'juz' ? 'bg-emerald-50 dark:bg-emerald-900/30' : ''}`}><Icon name="layers" size={22} strokeWidth={viewMode === 'juz' ? 3 : 2} /></div>
                            <span className="text-[9px] font-black uppercase tracking-widest">Juz</span>
                        </button>
                        <button onClick={() => { setViewMode('settings'); scrollToTop(); }} className={`flex flex-col items-center gap-1.5 transition-all ${viewMode === 'settings' ? 'text-emerald-600 scale-110' : 'text-slate-300 dark:text-slate-600'}`}>
                            <div className={`p-1.5 rounded-xl ${viewMode === 'settings' ? 'bg-emerald-50 dark:bg-emerald-900/30' : ''}`}><Icon name="settings" size={22} strokeWidth={viewMode === 'settings' ? 3 : 2} /></div>
                            <span className="text-[9px] font-black uppercase tracking-widest">Menu</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

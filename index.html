function getJuzForVerse(surahNum, verseNum) {
    const v = verseNum === 0 ? 1 : verseNum;
    for (let i = 0; i < JUZ_START.length; i++) {
        const curr = JUZ_START[i];
        const next = JUZ_START[i + 1];
        if (!next) return 30;
        if (surahNum < next.s || (surahNum === next.s && v < next.v)) return curr.juz;
    }
    return 30;
}

function getJuzSegments(juzNum) {
    const startMarker = JUZ_START.find(j => j.juz === juzNum);
    const endMarker = juzNum === 30 ? null : JUZ_START.find(j => j.juz === juzNum + 1);
    const segments = [];
    let cS = startMarker.s;
    let cV = startMarker.v;
    while (true) {
        const surahInfo = SURAH_DATA.find(s => s.number === cS);
        if (!surahInfo) break;
        if (endMarker && cS === endMarker.s) {
            segments.push({ s: cS, start: cV, end: endMarker.v - 1 });
            break;
        } else {
            segments.push({ s: cS, start: cV, end: surahInfo.verses });
            if (!endMarker && cS === 114) break;
            cS++;
            cV = 1;
        }
    }
    return segments;
}

function isJuzComplete(juzNum, progressObj) {
    return getJuzSegments(juzNum).every(seg => (progressObj[seg.s] || 0) >= seg.end);
}

function getAbsoluteVerseCount(surahNum, verseNum) {
    let total = 0;
    for (let i = 1; i < surahNum; i++) {
        const s = SURAH_DATA.find(x => x.number === i);
        if (s) total += s.verses;
    }
    return total + verseNum;
}

const JUZ_LIST = Array.from({ length: 30 }, (_, i) => {
    const num = i + 1;
    const start = JUZ_START.find(j => j.juz === num);
    const surahName = SURAH_DATA.find(s => s.number === start.s).name;
    return { number: num, start: surahName + ' ayat ' + start.v };
});

function loadLocal(key, fallback) {
    try {
        const saved = localStorage.getItem(key);
        if (saved !== null) return JSON.parse(saved);
    } catch (e) {}
    return fallback;
}
function saveLocal(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}
function removeLocal(key) {
    try { localStorage.removeItem(key); } catch (e) {}
}

// Parse "06:10 AM" -> {h:6, m:10}
function parseTime12(timeStr) {
    if (!timeStr) return null;
    const parts = timeStr.trim().split(' ');
    const timeParts = parts[0].split(':');
    let h = parseInt(timeParts[0]);
    const m = parseInt(timeParts[1]);
    const period = parts[1];
    if (period === 'PM' && h !== 12) h += 12;
    if (period === 'AM' && h === 12) h = 0;
    return { h, m };
}

function toTime24(timeStr) {
    const t = parseTime12(timeStr);
    if (!t) return timeStr;
    return String(t.h).padStart(2, '0') + ':' + String(t.m).padStart(2, '0');
}

function toMinutes(h, m) {
    return h * 60 + m;
}

function PrayerView() {
    const [times, setTimes] = useState(null);
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState(null);
    const [city, setCity] = useState(() => loadLocal('prayer-city', 'Jakarta'));
    const [cityInput, setCityInput] = useState(() => loadLocal('prayer-city', 'Jakarta'));
    const [currentTime, setCurrentTime] = useState(new Date());
    const [nextPrayer, setNextPrayer] = useState(null);
    const [countdown, setCountdown] = useState('');
    const [usingGPS, setUsingGPS] = useState(false);

    async function fetchByCity(name) {
        setLoading(true);
        setError(null);
        try {
            const now = new Date();
            const dd = now.getDate();
            const mm = now.getMonth() + 1;
            const yyyy = now.getFullYear();
            const url = 'https://api.aladhan.com/v1/timingsByCity/' + dd + '-' + mm + '-' + yyyy + '?city=' + encodeURIComponent(name) + '&country=ID&method=11';
            const res = await fetch(url);
            const data = await res.json();
            if (data.code === 200) {
                setTimes(data.data.timings);
                setCity(name);
                saveLocal('prayer-city', name);
                saveLocal('prayer-cache', { timings: data.data.timings, date: now.toLocaleDateString('en-CA') });
            } else {
                setError('Kota tidak ditemukan. Coba nama kota lain.');
            }
        } catch (e) {
            setError('Gagal memuat. Periksa koneksi internet.');
        }
        setLoading(false);
    }

    async function fetchByCoords(lat, lng) {
        setLoading(true);
        setError(null);
        try {
            const now = new Date();
            const dd = now.getDate();
            const mm = now.getMonth() + 1;
            const yyyy = now.getFullYear();
            const url = 'https://api.aladhan.com/v1/timings/' + dd + '-' + mm + '-' + yyyy + '?latitude=' + lat + '&longitude=' + lng + '&method=11';
            const res = await fetch(url);
            const data = await res.json();
            if (data.code === 200) {
                setTimes(data.data.timings);
                saveLocal('prayer-cache', { timings: data.data.timings, date: now.toLocaleDateString('en-CA') });
                const tz = data.data.meta && data.data.meta.timezone;
                if (tz) {
                    const parts = tz.split('/');
                    const cityFromTZ = parts[1] ? parts[1].replace(/_/g, ' ') : name;
                    setCity(cityFromTZ);
                }
            } else {
                setError('Tidak bisa mengambil jadwal dari lokasi ini.');
            }
        } catch (e) {
            setError('Gagal memuat. Periksa koneksi internet.');
        }
        setLoading(false);
    }

    function handleGPS() {
        if (!navigator.geolocation) {
            setError('GPS tidak tersedia di perangkat ini.');
            return;
        }
        setLoading(true);
        navigator.geolocation.getCurrentPosition(
            function(pos) {
                setUsingGPS(true);
                fetchByCoords(pos.coords.latitude, pos.coords.longitude);
            },
            function() {
                setError('Izin lokasi ditolak. Coba ketik nama kota.');
                setLoading(false);
            },
            { timeout: 10000 }
        );
    }

    // Load on mount - use cache if today
    useEffect(function() {
        const cache = loadLocal('prayer-cache', null);
        const today = new Date().toLocaleDateString('en-CA');
        if (cache && cache.date === today && cache.timings) {
            setTimes(cache.timings);
        } else {
            fetchByCity(city);
        }
    }, []);

    // Tick every second
    useEffect(function() {
        const timer = setInterval(function() {
            setCurrentTime(new Date());
        }, 1000);
        return function() { clearInterval(timer); };
    }, []);

    // Calculate next prayer & countdown
    useEffect(function() {
        if (!times) return;
        const nowMinutes = toMinutes(currentTime.getHours(), currentTime.getMinutes());

        let found = null;
        for (let i = 0; i < MAIN_PRAYERS.length; i++) {
            const key = MAIN_PRAYERS[i];
            const t = parseTime12(times[key]);
            if (!t) continue;
            const pMin = toMinutes(t.h, t.m);
            if (pMin > nowMinutes) {
                found = { key, h: t.h, m: t.m, min: pMin };
                break;
            }
        }
        // After Isha, next is Fajr tomorrow
        if (!found) {
            const fajr = parseTime12(times['Fajr']);
            if (fajr) {
                found = { key: 'Fajr', h: fajr.h, m: fajr.m, min: toMinutes(fajr.h, fajr.m) + 1440 };
            }
        }
        setNextPrayer(found);

        if (found) {
            const diff = (found.min - nowMinutes + 1440) % 1440;
            const h = Math.floor(diff / 60);
            const m = diff % 60;
            const s = 59 - currentTime.getSeconds();
            const hStr = h > 0 ? h + 'j ' : '';
            setCountdown(hStr + m + 'm ' + String(s).padStart(2, '0') + 'd');
        }
    }, [currentTime, times]);

    function isCurrentPrayer(key) {
        if (!times || !nextPrayer) return false;
        const idx = MAIN_PRAYERS.indexOf(key);
        const nextIdx = MAIN_PRAYERS.indexOf(nextPrayer.key);
        if (nextIdx === 0) return idx === MAIN_PRAYERS.length - 1;
        return idx === nextIdx - 1;
    }

    const hh = String(currentTime.getHours()).padStart(2, '0');
    const mm2 = String(currentTime.getMinutes()).padStart(2, '0');
    const ss = String(currentTime.getSeconds()).padStart(2, '0');
    const timeDisplay = hh + ':' + mm2 + ':' + ss;
    const dateDisplay = currentTime.toLocaleDateString('id-ID', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });

    return (
        <div className="space-y-4 anim-fadeup">

            {/* Clock Card */}
            <div className="bg-gradient-to-br from-slate-800 to-slate-900 rounded-[2.5rem] p-7 text-white shadow-2xl relative overflow-hidden border border-slate-700/40">
                <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'radial-gradient(circle at 80% 20%, #10b981, transparent 60%)' }} />
                <div className="relative z-10">
                    <div className="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-1">Waktu Sekarang</div>
                    <div className="text-5xl font-black tabular-nums tracking-tight shimmer-text mb-1">{timeDisplay}</div>

// WEEKLY STATS
// ═══════════════════════════════════════════════

function WeeklyStats({ haidLog, onToggleHaid, pageMode }) {
    const dailyLog = loadLocal('q-daily-log', {});
    const haid = haidLog || {};
    const isPageMode = pageMode === 'halaman';

    // Build last 7 days array
    const days = [];
    for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const key = d.toLocaleDateString('en-CA');
        const label = d.toLocaleDateString('id-ID', { weekday: 'short' }).substring(0, 3);
        const countAyat = dailyLog[key] || 0;
        // Konversi kasar: 6236 ayat / 604 halaman ≈ 10.3 ayat per halaman
        const countPages = countAyat > 0 ? Math.max(1, Math.round(countAyat / 10.3)) : 0;
        const count = isPageMode ? countPages : countAyat;
        const isHaid = haid[key] === true;
        const isToday = i === 0;
        days.push({ key, label, count, countAyat, isHaid, isToday });
    }

    const maxCount = Math.max(...days.map(function(d) { return d.count; }), 1);
    const activeDays = days.filter(function(d) { return d.count > 0 && !d.isHaid; }).length;
    const haidDays = days.filter(function(d) { return d.isHaid; }).length;
    const totalWeek = days.reduce(function(a, d) { return a + d.count; }, 0);
    const avgPerDay = activeDays > 0 ? Math.round(totalWeek / activeDays) : 0;
    const unit = isPageMode ? 'hlm' : 'ayat';

    return (
        <div className="bg-white dark:bg-slate-900 rounded-[2rem] p-5 shadow-xl border border-slate-100 dark:border-slate-800">
            <div className="flex items-center justify-between mb-4">
                <span className="text-[9px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 flex items-center gap-1.5">
                    <Icon name="barChart" size={12} /> Statistik 7 Hari
                </span>
                <div className="flex gap-3 text-right">
                    <div>
                        <div className="text-[8px] font-black uppercase tracking-widest text-slate-400">Total</div>
                        <div className="text-sm font-black text-emerald-600 tabular-nums">{totalWeek} <span className="text-[8px]">{unit}</span></div>
                    </div>
                    <div>
                        <div className="text-[8px] font-black uppercase tracking-widest text-slate-400">Rata-rata</div>
                        <div className="text-sm font-black text-emerald-600 tabular-nums">{avgPerDay}/{unit}</div>
                    </div>
                    {haidDays > 0 && (
                        <div>
                            <div className="text-[8px] font-black uppercase tracking-widest text-pink-400">Haid</div>
                            <div className="text-sm font-black text-pink-500 tabular-nums">{haidDays}hr</div>
                        </div>
                    )}
                </div>
            </div>

            {/* Bar chart */}
            <div className="flex items-end gap-1.5" style={{ height: '90px' }}>
                {days.map(function(day) {
                    const heightPct = maxCount > 0 ? (day.count / maxCount) * 100 : 0;
                    const minH = day.count > 0 ? 8 : 4;

                    if (day.isHaid) {
                        return (
                            <div key={day.key} className="flex-1 flex flex-col items-center justify-end gap-1">
                                <div className="text-[10px] leading-none">🌸</div>
                                <div
                                    className={'w-full rounded-lg border-2 ' + (day.isToday ? 'border-pink-400 bg-pink-100 dark:bg-pink-900/40' : 'border-pink-200 bg-pink-50 dark:bg-pink-900/20')}
                                    style={{ height: '18px' }}
                                />
                                <div className={'text-[8px] font-black uppercase ' + (day.isToday ? 'text-pink-500' : 'text-pink-400')}>
                                    {day.label}
                                </div>
                            </div>
                        );
                    }

                    return (
                        <button
                            key={day.key}
                            onClick={function() { onToggleHaid(day.key); }}
                            className="flex-1 flex flex-col items-center justify-end gap-1 active:opacity-70 transition-opacity"
                            title={'Tandai ' + day.label + ' sebagai haid'}
                        >
                            <div className="text-[8px] font-black text-slate-500 dark:text-slate-500 tabular-nums leading-none">
                                {day.count > 0 ? day.count : ''}
                            </div>
                            <div
                                className={'rounded-lg transition-all duration-700 w-full ' + (day.isToday ? 'bg-emerald-500' : day.count > 0 ? 'bg-emerald-200 dark:bg-emerald-800' : 'bg-slate-100 dark:bg-slate-800')}
                                style={{ height: Math.max(minH, heightPct * 0.62) + 'px' }}
                            />
                            <div className={'text-[8px] font-black uppercase ' + (day.isToday ? 'text-emerald-600' : 'text-slate-400 dark:text-slate-600')}>
                                {day.label}
                            </div>
                        </button>
                    );
                })}
            </div>

            {/* Legend + hint */}
            <div className="flex gap-3 mt-3 flex-wrap items-center">
                <div className="flex items-center gap-1">
                    <div className="w-3 h-3 rounded bg-emerald-200 dark:bg-emerald-800" />
                    <span className="text-[8px] font-black text-slate-400 uppercase tracking-wider">Baca</span>
                </div>
                <div className="flex items-center gap-1">
                    <div className="w-3 h-3 rounded bg-pink-100 dark:bg-pink-900/40 border border-pink-200" />
                    <span className="text-[8px] font-black text-pink-400 uppercase tracking-wider">Haid</span>
                </div>
                <div className="flex items-center gap-1">
                    <div className="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800" />
                    <span className="text-[8px] font-black text-slate-400 uppercase tracking-wider">Kosong</span>
                </div>
                <span className="text-[7px] font-black text-slate-300 dark:text-slate-600 ml-auto">Tap bar untuk tandai haid</span>
            </div>
        </div>
    );
}

// JUZ MAP
// ═══════════════════════════════════════════════

function JuzMap({ progress }) {
    // Calculate % per juz (read-only from progress)
    const juzProgress = Array.from({ length: 30 }, function(_, i) {
        const juzNum = i + 1;
        const segs = getJuzSegments(juzNum);
        let totalVerses = 0;
        let readVerses = 0;
        segs.forEach(function(seg) {
            const segVerses = seg.end - seg.start + 1;
            const cur = progress[seg.s] || 0;
            const read = Math.max(0, Math.min(cur, seg.end) - seg.start + 1);
            totalVerses += segVerses;
            readVerses += cur >= seg.start ? Math.min(read, segVerses) : 0;
        });
        const pct = totalVerses > 0 ? Math.round((readVerses / totalVerses) * 100) : 0;
        const done = isJuzComplete(juzNum, progress);
        return { juzNum, pct, done };
    });

    return (
        <div className="bg-white dark:bg-slate-900 rounded-[2rem] p-5 shadow-xl border border-slate-100 dark:border-slate-800">
            <div className="flex items-center justify-between mb-4">
                <span className="text-[9px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 flex items-center gap-1.5">
                    <Icon name="layers" size={12} /> Peta Progress Juz
                </span>
                <span className="text-[9px] font-black text-slate-400">
                    {juzProgress.filter(function(j) { return j.done; }).length}/30 selesai
                </span>
            </div>
            <div className="grid grid-cols-6 gap-1.5">
                {juzProgress.map(function(j) {
                    let bg = 'bg-slate-100 dark:bg-slate-800';
                    let textColor = 'text-slate-400 dark:text-slate-500';
                    if (j.done) {
                        bg = 'bg-emerald-500';
                        textColor = 'text-white';
                    } else if (j.pct >= 50) {
                        bg = 'bg-emerald-200 dark:bg-emerald-800';
                        textColor = 'text-emerald-800 dark:text-emerald-200';
                    } else if (j.pct > 0) {
                        bg = 'bg-emerald-100 dark:bg-emerald-900/60';
                        textColor = 'text-emerald-600 dark:text-emerald-400';
                    }
                    return (
                        <div
                            key={j.juzNum}
                            className={'rounded-xl flex flex-col items-center justify-center py-2 px-1 ' + bg}
                            title={'Juz ' + j.juzNum + ': ' + j.pct + '%'}
                        >
                            <span className={'text-[10px] font-black tabular-nums leading-none ' + textColor}>{j.juzNum}</span>
                            {j.done ? (
                                <span className="text-[8px] text-white/80 font-black mt-0.5">✓</span>
                            ) : j.pct > 0 ? (
                                <span className={'text-[7px] font-black mt-0.5 tabular-nums ' + textColor}>{j.pct}%</span>
                            ) : (
                                <span className="text-[7px] text-slate-300 dark:text-slate-700 mt-0.5">—</span>
                            )}
                        </div>
                    );
                })}
            </div>
            {/* Legend */}
            <div className="flex gap-3 mt-3 flex-wrap">
                {[
                    { color: 'bg-slate-100 dark:bg-slate-800', label: 'Belum' },
                    { color: 'bg-emerald-100 dark:bg-emerald-900/60', label: '<50%' },
                    { color: 'bg-emerald-200 dark:bg-emerald-800', label: '≥50%' },
                    { color: 'bg-emerald-500', label: 'Selesai' }
                ].map(function(item) {
                    return (
                        <div key={item.label} className="flex items-center gap-1">
                            <div className={'w-3 h-3 rounded ' + item.color} />
                            <span className="text-[8px] font-black text-slate-400 uppercase tracking-wider">{item.label}</span>
                        </div>
                    );
                })}
            </div>
        </div>
    );
}

// KHATAM TARGET (by date)
// ═══════════════════════════════════════════════

function KhatamTarget({ currentTotal, haidLog, pageMode, pagesRead }) {
    const [targetDt, setTargetDt] = useState(function() { return loadLocal('q-khatam-target', ''); });
    const [editing, setEditing] = useState(false);
    const [inputVal, setInputVal] = useState('');
    const haid = haidLog || {};
    const isPageMode = pageMode === 'halaman';

    useEffect(function() { saveLocal('q-khatam-target', targetDt); }, [targetDt]);

    const plan = useMemo(function() {
        if (!targetDt) return null;
        const todayDate = new Date();
        todayDate.setHours(0, 0, 0, 0);
        const target = new Date(targetDt);
        target.setHours(0, 0, 0, 0);
        const totalCalDays = Math.ceil((target - todayDate) / 86400000);
        if (totalCalDays < 0) return { expired: true };

        // Count active (non-haid) days remaining including today
        let activeDaysLeft = 0;
        const cursor = new Date(todayDate);
        while (cursor <= target) {
            const k = cursor.toLocaleDateString('en-CA');
            if (!haid[k]) activeDaysLeft++;
            cursor.setDate(cursor.getDate() + 1);
        }

        const remaining = Math.max(0, 6236 - currentTotal);
        const ayatPerDay = activeDaysLeft > 0 ? Math.ceil(remaining / activeDaysLeft) : remaining;
        const pagesRemaining = Math.max(0, TOTAL_PAGES - (pagesRead || 0));
        const pagesPerDay = activeDaysLeft > 0 ? Math.ceil(pagesRemaining / activeDaysLeft) : pagesRemaining;
        const pct = Math.round((currentTotal / 6236) * 100);
        const haidDaysAhead = totalCalDays + 1 - activeDaysLeft;
        return { expired: false, totalCalDays, activeDaysLeft, ayatPerDay, pagesPerDay, remaining, pagesRemaining, pct, haidDaysAhead };
    }, [targetDt, currentTotal, haid, pagesRead]);

    if (!targetDt && !editing) {
        return (
            <div className="bg-white dark:bg-slate-900 rounded-[2rem] p-5 shadow-xl border border-slate-100 dark:border-slate-800">
                <div className="text-[9px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 flex items-center gap-1.5 mb-3">
                    <Icon name="flagTarget" size={12} /> Target Khatam
                </div>
                <button
                    onClick={function() { setEditing(true); setInputVal(''); }}
                    className="w-full py-3 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-400 active:scale-95 transition-transform"
                >
                    + Set Tanggal Target
                </button>
            </div>
        );
    }

    if (editing) {
        return (
            <div className="bg-white dark:bg-slate-900 rounded-[2rem] p-5 shadow-xl border border-slate-100 dark:border-slate-800">
                <div className="text-[9px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 flex items-center gap-1.5 mb-3">
                    <Icon name="flagTarget" size={12} /> Target Khatam
                </div>
                <div className="flex gap-2">
                    <input
                        type="date"
                        className="flex-1 bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl px-4 py-3 text-sm font-black outline-none focus:border-emerald-500 transition-colors dark:text-slate-200"
                        value={inputVal}
                        onChange={function(e) { setInputVal(e.target.value); }}
                        min={new Date().toLocaleDateString('en-CA')}
                    />
                    <button
                        onClick={function() {
                            if (inputVal) { setTargetDt(inputVal); }
                            setEditing(false);
                        }}
                        className="bg-emerald-600 text-white px-5 py-3 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-90 transition-transform"
                    >
                        Simpan
                    </button>
                    <button
                        onClick={function() { setEditing(false); }}
                        className="bg-slate-100 dark:bg-slate-800 text-slate-400 px-4 py-3 rounded-2xl font-black text-xs active:scale-90 transition-transform"
                    >
                        ✕
                    </button>
                </div>
            </div>
        );
    }

    // Show plan
    const targetFormatted = new Date(targetDt).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

    return (
        <div className={'bg-white dark:bg-slate-900 rounded-[2rem] p-5 shadow-xl border-2 ' + (plan && plan.expired ? 'border-red-200 dark:border-red-900' : 'border-slate-100 dark:border-slate-800')}>
            <div className="flex items-center justify-between mb-4">
                <span className="text-[9px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 flex items-center gap-1.5">
                    <Icon name="flagTarget" size={12} /> Target Khatam
                </span>
                <button
                    onClick={function() { setEditing(true); setInputVal(targetDt); }}
                    className="text-[9px] font-black text-slate-400 border border-slate-100 dark:border-slate-800 px-3 py-1 rounded-full"
                >
                    UBAH
                </button>
            </div>

            {plan && plan.expired ? (
                <div className="text-center py-2">
                    <div className="text-2xl mb-1">⏰</div>
                    <p className="font-black text-red-500 text-sm">Target terlewat</p>
                    <p className="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">{targetFormatted}</p>
                    <button
                        onClick={function() { setTargetDt(''); }}
                        className="mt-3 text-[9px] font-black text-slate-400 underline"
                    >Reset target</button>
                </div>
            ) : plan ? (
                <div>
                    <div className="flex justify-between items-end mb-2">
                        <div>
                            <div className="text-[8px] font-black uppercase tracking-widest text-slate-400 mb-0.5">Target</div>
                            <div className="font-black text-sm text-slate-700 dark:text-slate-200">{targetFormatted}</div>
                        </div>
                        <div className="text-right">
                            <div className="text-[8px] font-black uppercase tracking-widest text-slate-400 mb-0.5">Hari aktif tersisa</div>
                            <div className="font-black text-2xl text-emerald-600 tabular-nums">{plan.activeDaysLeft}h</div>
                        </div>
                    </div>

                    {/* Progress bar */}

                    {/* Stats grid */}
                    <div className="grid grid-cols-3 gap-2 text-center">
                        <div className="bg-slate-50 dark:bg-slate-800 rounded-2xl py-2.5 px-1">
                            <div className="text-[8px] font-black uppercase tracking-widest text-slate-400 mb-0.5">Selesai</div>

                                {isPageMode ? (pagesRead || 0) : currentTotal}
                            </div>
                            <div className="text-[7px] font-black text-slate-500">{isPageMode ? 'halaman' : 'ayat'}</div>
                        </div>
                        <div className="bg-emerald-50 dark:bg-emerald-950/40 rounded-2xl py-2.5 px-1">
                            <div className="text-[8px] font-black uppercase tracking-widest text-emerald-500 mb-0.5">Harus/hari</div>
                            <div className="font-black text-base text-emerald-600 tabular-nums">
                                {isPageMode ? plan.pagesPerDay : plan.ayatPerDay}
                            </div>
                            <div className="text-[7px] font-black text-emerald-400">{isPageMode ? 'hlm' : 'ayat'}</div>
                        </div>
                        <div className="bg-slate-50 dark:bg-slate-800 rounded-2xl py-2.5 px-1">
                            <div className="text-[8px] font-black uppercase tracking-widest text-slate-400 mb-0.5">Sisa</div>
                            <div className="font-black text-base text-slate-700 dark:text-slate-200 tabular-nums">
                                {isPageMode ? plan.pagesRemaining : plan.remaining}
                            </div>
                            <div className="text-[7px] font-black text-slate-500">{isPageMode ? 'halaman' : 'ayat'}</div>
                        </div>
                    </div>

                    {plan.haidDaysAhead > 0 && (
                        <div className="mt-3 bg-pink-50 dark:bg-pink-950/20 rounded-2xl py-2.5 px-3 flex items-center gap-2">
                            <span className="text-sm">🌸</span>
                            <span className="text-[9px] font-black text-pink-500">{plan.haidDaysAhead} hari haid tidak dihitung — target menyesuaikan otomatis</span>
                        </div>
                    )}

                    {currentTotal >= 6236 && (
                        <div className="mt-3 bg-emerald-50 dark:bg-emerald-950/30 rounded-2xl py-3 text-center">
                            <p className="font-black text-emerald-600 text-sm">🏆 Alhamdulillah, sudah khatam!</p>
                        </div>
                    )}
                </div>
            ) : null}
        </div>
    );
}

// ═══════════════════════════════════════════════
// COMPACT INPUT — tap angka untuk ketik langsung
// ═══════════════════════════════════════════════

function CompactInput({ surahNumber, cur, maxVerse, onUpdate }) {
    const [editing, setEditing] = useState(false);
    const [draft, setDraft] = useState('');
    const inputRef = useRef(null);

    function startEdit() {
        setDraft(cur === 0 ? '' : String(cur));
        setEditing(true);
        setTimeout(function() {
            if (inputRef.current) inputRef.current.focus();
        }, 50);
    }

    function commitEdit() {
        const val = parseInt(draft);
        if (!isNaN(val)) onUpdate(surahNumber, val);
        setEditing(false);
    }

    function handleKey(e) {
        if (e.key === 'Enter') commitEdit();
        if (e.key === 'Escape') setEditing(false);
    }

    if (editing) {
        return (
            <input
                ref={inputRef}
                type="number"
                inputMode="numeric"
                aria-label={'Ketik ayat surah ' + surahNumber}
                value={draft}
                onChange={function(e) { setDraft(e.target.value); }}
                onBlur={commitEdit}
                onKeyDown={handleKey}
                placeholder="0"
                className="w-10 h-8 text-center font-black text-sm bg-white dark:bg-slate-800 border-2 border-emerald-400 rounded-lg outline-none tabular-nums dark:text-slate-200"
            />
        );
    }

    return (
        <button
            onClick={startEdit}
            aria-label={'Ayat ke-' + cur + ', tap untuk edit'}
            className="w-10 h-8 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 font-black text-sm text-slate-700 dark:text-slate-200 tabular-nums active:scale-90 transition-all"
        >
            {cur === 0 ? '0' : cur}
        </button>
    );
}

function LastReadBanner({ lastRead, viewMode, searchTerm, progress }) {
    if (!lastRead || viewMode !== 'surah' || searchTerm) return null;
    const s = SURAH_DATA.find(function(x) { return x.number === lastRead; });
    if (!s) return null;
    const cur = progress[s.number] || 0;
    function scrollTo() {

        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });

    return (
        <div className="bg-gradient-to-br from-emerald-500 to-emerald-700 p-5 rounded-[2.5rem] shadow-2xl border border-emerald-400/30 text-white">

                <div className="p-1.5 bg-white/20 rounded-xl">

                </div>

// ═══════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════

function App() {
    const [viewMode, setViewMode] = useState('surah');
    const [searchTerm, setSearchTerm] = useState('');
    const [showScrollTop, setShowScrollTop] = useState(false);
    const [isDark, setIsDark] = useState(() => loadLocal('q-dark', false));
    const [showKhatamModal, setShowKhatamModal] = useState(false);

    const [progress, setProgress] = useState(() => loadLocal('q-progress', {}));
    const [lastRead, setLastRead] = useState(() => loadLocal('q-last', null));
    const [streak, setStreak] = useState(() => parseInt(loadLocal('q-streak', 0)) || 0);
    const [lastActiveDate, setLastActiveDate] = useState(() => loadLocal('q-date', null));
    const [khatamCount, setKhatamCount] = useState(() => parseInt(loadLocal('q-khatam', 0)) || 0);
    const [targetJuz, setTargetJuz] = useState(() => loadLocal('q-tjuz', null));
    const [dailyStart, setDailyStart] = useState(() => parseInt(loadLocal('q-dstart', 0)) || 0);
    const [targetDate, setTargetDate] = useState(() => loadLocal('q-tdate', new Date().toLocaleDateString('en-CA')));
    // Haid mode — key baru, tidak ganggu data lama sama sekali
    const [haidLog, setHaidLog] = useState(() => loadLocal('q-haid-log', {}));
    // Mode tampilan: 'ayat' atau 'halaman' — hanya preferensi UI, tidak ganggu data
    const [pageMode, setPageMode] = useState(() => loadLocal('q-page-mode', 'ayat'));

    // Refs for stale-closure-safe access
    const lastActiveDateRef = useRef(lastActiveDate);
    const targetDateRef = useRef(targetDate);
    const currentTotalRef = useRef(0);
    useEffect(function() { lastActiveDateRef.current = lastActiveDate; }, [lastActiveDate]);
    useEffect(function() { targetDateRef.current = targetDate; }, [targetDate]);

    // Dark mode
    useEffect(function() {
        document.documentElement.classList.toggle('dark', isDark);
        saveLocal('q-dark', isDark);
    }, [isDark]);

    // Persist state
    useEffect(function() { saveLocal('q-progress', progress); }, [progress]);
    useEffect(function() { if (lastRead !== null) saveLocal('q-last', lastRead); }, [lastRead]);
    useEffect(function() { saveLocal('q-streak', streak); }, [streak]);
    useEffect(function() { if (lastActiveDate) saveLocal('q-date', lastActiveDate); }, [lastActiveDate]);
    useEffect(function() { saveLocal('q-khatam', khatamCount); }, [khatamCount]);
    useEffect(function() { if (targetJuz) saveLocal('q-tjuz', targetJuz); else removeLocal('q-tjuz'); }, [targetJuz]);
    useEffect(function() { saveLocal('q-dstart', dailyStart); }, [dailyStart]);
    useEffect(function() { saveLocal('q-tdate', targetDate); }, [targetDate]);
    useEffect(function() { saveLocal('q-haid-log', haidLog); }, [haidLog]);
    useEffect(function() { saveLocal('q-page-mode', pageMode); }, [pageMode]);

    // Haid helpers
    const today = new Date().toLocaleDateString('en-CA');
    const isHaidToday = haidLog[today] === true;

    function toggleHaidToday() {
        setHaidLog(function(prev) {
            const next = Object.assign({}, prev);
            if (next[today]) {
                delete next[today];
            } else {
                next[today] = true;
            }
            return next;
        });
    }

    // Toggle haid for a specific past date (for retroactive marking)
    function toggleHaidDate(dateKey) {
        const todayKey = new Date().toLocaleDateString('en-CA');
        if (dateKey !== todayKey) {
            const dayLabel = new Date(dateKey + 'T12:00:00').toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'short' });
            const isCurrentlyHaid = haidLog[dateKey] === true;
            const msg = isCurrentlyHaid
                ? 'Hapus tandai haid untuk ' + dayLabel + '?'
                : 'Tandai ' + dayLabel + ' sebagai hari haid?';
            if (!window.confirm(msg)) return;
        }
        setHaidLog(function(prev) {
            const next = Object.assign({}, prev);
            if (next[dateKey]) {
                delete next[dateKey];
            } else {
                next[dateKey] = true;
            }
            return next;
        });
    }

    // Scroll listener
    useEffect(function() {
        function handleScroll() { setShowScrollTop(window.scrollY > 300); }
        window.addEventListener('scroll', handleScroll, { passive: true });
        return function() { window.removeEventListener('scroll', handleScroll); };
    }, []);

    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

    // Total verses read
    const currentTotal = useMemo(function() {
        let total = 0;
        SURAH_DATA.forEach(function(s) { total += progress[s.number] || 0; });
        return total;
    }, [progress]);

    // Keep ref synced
    currentTotalRef.current = currentTotal;

    // Record daily activity - takes newTotal as param to avoid stale value
    const recordActivity = useCallback(function(newTotal) {
        const todayKey = new Date().toLocaleDateString('en-CA');
        const stored = lastActiveDateRef.current;
        if (stored !== todayKey) {
            if (stored) {
                // Count actual non-haid gap between last active date and today
                const haidData = loadLocal('q-haid-log', {});
                let gap = 0;
                let cursor = new Date(stored);
                cursor.setDate(cursor.getDate() + 1);
                const todayDate = new Date(todayKey);
                while (cursor < todayDate) {
                    const k = cursor.toLocaleDateString('en-CA');
                    if (!haidData[k]) gap++;
                    cursor.setDate(cursor.getDate() + 1);
                }
                // gap = jumlah hari non-haid antara lastActive dan hari ini (tidak termasuk hari ini)
                setStreak(function(prev) { return gap === 0 ? prev + 1 : 1; });
            } else {
                setStreak(1);
            }
            setLastActiveDate(todayKey);
        }
        if (targetDateRef.current !== todayKey) {
            setTargetDate(todayKey);
            setDailyStart(newTotal);
        }
        // Update daily log
        const log = loadLocal('q-daily-log', {});
        const logStart = loadLocal('q-daily-log-start', {});
        if (!logStart[todayKey]) {
            const snap = Object.assign({}, logStart);
            snap[todayKey] = currentTotalRef.current;
            saveLocal('q-daily-log-start', snap);
        }
        const startVal = logStart[todayKey] !== undefined ? logStart[todayKey] : currentTotalRef.current;
        const todayCount = Math.max(0, newTotal - startVal);
        const updatedLog = Object.assign({}, log);
        updatedLog[todayKey] = todayCount;
        const keys = Object.keys(updatedLog).sort();
        if (keys.length > 30) { delete updatedLog[keys[0]]; }
        saveLocal('q-daily-log', updatedLog);
    }, []);

    // Target stats
    const targetStats = useMemo(function() {
        if (!targetJuz) return null;
        let targetTotal, targetLabel;
        if (parseInt(targetJuz) === 31) {
            targetTotal = 6236;
            targetLabel = 'Khatam';
        } else {
            const ji = JUZ_START.find(function(j) { return j.juz === parseInt(targetJuz); });
            if (!ji) return null;
            targetTotal = getAbsoluteVerseCount(ji.s, ji.v - 1);
            targetLabel = 'Awal Juz ' + targetJuz;
        }
        const readToday = Math.max(0, currentTotal - dailyStart);
        const toRead = Math.max(1, targetTotal - dailyStart);
        const reached = currentTotal >= targetTotal;
        const pct = reached ? 100 : Math.min(100, Math.round((readToday / toRead) * 100));
        return { label: targetLabel, readToday, toRead, pct, reached };
    }, [targetJuz, currentTotal, dailyStart]);

    // Overall stats
    const stats = useMemo(function() {
        let surahsDone = 0;
        SURAH_DATA.forEach(function(s) { if ((progress[s.number] || 0) === s.verses) surahsDone++; });
        let juzDone = 0;
        for (let i = 1; i <= 30; i++) { if (isJuzComplete(i, progress)) juzDone++; }
        const pagesRead = versesToPages(progress);
        return {
            pct: Math.round((currentTotal / 6236) * 100),
            surahsDone,
            juzDone,
            pagesRead,
            pagesPct: Math.round((pagesRead / TOTAL_PAGES) * 100)
        };
    }, [progress, currentTotal]);

    // Auto khatam detection
    const prevTotalRef = useRef(currentTotal);
    useEffect(function() {
        const prev = prevTotalRef.current;
        prevTotalRef.current = currentTotal;
        if (prev < 6236 && currentTotal >= 6236) {
            setKhatamCount(function(c) { return c + 1; });
            setShowKhatamModal(true);
        }
    }, [currentTotal]);

    // Update verse
    const updateVerse = useCallback(function(surahNumber, verse) {
        const surah = SURAH_DATA.find(function(s) { return s.number === surahNumber; });
        const newVerse = Math.max(0, Math.min(verse, surah.verses));
        let newTotal = 0;
        SURAH_DATA.forEach(function(s) {
            newTotal += s.number === surahNumber ? newVerse : (progress[s.number] || 0);
        });
        recordActivity(newTotal);
        setProgress(function(prev) {
            const next = Object.assign({}, prev);
            next[surahNumber] = newVerse;
            return next;
        });
        setLastRead(surahNumber);
    }, [progress, recordActivity]);

    // Toggle surah complete
    const toggleComplete = useCallback(function(surahNumber) {
        const surah = SURAH_DATA.find(function(s) { return s.number === surahNumber; });
        updateVerse(surahNumber, (progress[surahNumber] || 0) === surah.verses ? 0 : surah.verses);
    }, [progress, updateVerse]);

    // Toggle juz complete
    const toggleJuz = useCallback(function(juzNumber) {
        const segments = getJuzSegments(juzNumber);
        const completed = isJuzComplete(juzNumber, progress);
        const nextProg = Object.assign({}, progress);
        segments.forEach(function(seg) {
            if (completed) {
                nextProg[seg.s] = Math.max(0, seg.start - 1);
            } else {
                nextProg[seg.s] = Math.max(nextProg[seg.s] || 0, seg.end);
            }
        });
        let newTotal = 0;
        SURAH_DATA.forEach(function(s) { newTotal += nextProg[s.number] || 0; });
        recordActivity(newTotal);
        setProgress(nextProg);
        setLastRead(segments[segments.length - 1].s);
    }, [progress, recordActivity]);

    // Export
    function exportData() {
        const data = { progress, lastRead, streak, lastActiveDate, khatamCount, targetJuz, dailyStart, targetDate, isDark };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'jurnal-quran-' + new Date().toISOString().split('T')[0] + '.json';
        a.click();
        URL.revokeObjectURL(url);
    }

    // Import
    function importData(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            try {
                const d = JSON.parse(ev.target.result);
                if (window.confirm('Ganti data dengan backup ini?')) {
                    if (d.progress !== undefined) setProgress(d.progress);
                    if (d.lastRead !== undefined) setLastRead(d.lastRead);
                    if (d.streak !== undefined) setStreak(parseInt(d.streak) || 0);
                    if (d.lastActiveDate !== undefined) setLastActiveDate(d.lastActiveDate);
                    if (d.khatamCount !== undefined) setKhatamCount(parseInt(d.khatamCount) || 0);
                    if (d.targetJuz !== undefined) setTargetJuz(d.targetJuz);
                    if (d.dailyStart !== undefined) setDailyStart(parseInt(d.dailyStart) || 0);
                    if (d.targetDate !== undefined) setTargetDate(d.targetDate);
                    if (d.isDark !== undefined) setIsDark(d.isDark);
                    alert('Data berhasil dipulihkan!');
                }
            } catch (err) {
                alert('File tidak valid atau rusak.');
            }
        };
        reader.readAsText(file);
        e.target.value = '';
    }

    const filteredSurahs = useMemo(function() {
        return SURAH_DATA.filter(function(s) {
            return s.name.toLowerCase().includes(searchTerm.toLowerCase()) || s.number.toString() === searchTerm;
        });
    }, [searchTerm]);

    const filteredJuz = useMemo(function() {
        return JUZ_LIST.filter(function(j) { return j.number.toString().includes(searchTerm); });
    }, [searchTerm]);

    const TABS = [
        { id: 'surah', icon: 'list', label: 'SURAH' },
        { id: 'juz', icon: 'layers', label: 'JUZ' },
        { id: 'prayer', icon: 'clock', label: 'SHOLAT' },
        { id: 'settings', icon: 'settings', label: 'MENU' }
    ];

    return (
        <div className="pb-36 dark:text-slate-100">

            {showKhatamModal && (
                <KhatamModal
                    count={khatamCount}
                    onClose={function() {
                        setShowKhatamModal(false);
                        if (window.confirm('Mulai putaran baru? Progress akan direset.')) {
                            setProgress({});
                            setLastRead(null);
                        }
                    }}
                />
            )}

            {/* HEADER */}
            <header className="bg-emerald-600 dark:bg-emerald-900 text-white pb-16 px-5 rounded-b-[3rem] shadow-xl relative overflow-hidden transition-colors">
                <div className="absolute inset-0 opacity-20" style={{ backgroundImage: 'radial-gradient(circle at 90% 10%, #6ee7b7, transparent 50%)' }} />
                <div className="relative z-10">
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <h1 className="text-2xl font-black tracking-tight">Jurnal Quran</h1>
                            <p className="text-emerald-100 text-[9px] font-black uppercase tracking-widest opacity-80">Progress Baca Quran</p>
                        </div>
                        <div className="flex gap-2 items-center">
                            <button onClick={function() { setIsDark(!isDark); }} className="p-2 bg-white/10 rounded-xl" aria-label={isDark ? 'Aktifkan mode terang' : 'Aktifkan mode gelap'}>
                                <Icon name={isDark ? 'sun' : 'moon'} size={18} />
                            </button>
                            {streak > 0 && (
                                <div className={'bg-white/20 px-3 py-1.5 rounded-full text-sm font-black tabular-nums ' + (isHaidToday ? 'opacity-70' : '')}>
                                    {isHaidToday ? '🌸' : '🔥'}{streak}d
                                </div>
                            )}
                            {khatamCount > 0 && (
                                <div className="bg-white/20 px-3 py-1.5 rounded-full text-xs font-black">🏆{khatamCount}x</div>
                            )}
                        </div>
                    </div>
                    <div className="bg-white/10 backdrop-blur-xl rounded-3xl p-5 border border-white/20 shadow-2xl">
                        <div className="flex justify-between items-baseline mb-3">
                            <span className="text-[9px] font-black uppercase text-emerald-100 opacity-80 tracking-widest">Total Progress</span>
                            <span className="text-5xl font-black tabular-nums">{pageMode === 'halaman' ? stats.pagesPct : stats.pct}%</span>
                        </div>
                        <div className="w-full bg-black/10 rounded-full h-4 mb-3 overflow-hidden shadow-inner">
                            <div
                                className="bg-white h-full rounded-full transition-all duration-1000 shadow-lg"
                                style={{ width: (pageMode === 'halaman' ? stats.pagesPct : stats.pct) + '%' }}
                            />
                        </div>
                        <div className="grid grid-cols-2 gap-3 text-center mb-3">
                            <div className="bg-white/5 p-2 rounded-xl text-[9px] font-black uppercase tracking-wider">{stats.surahsDone}/114 Surah</div>
                            <div className="bg-white/5 p-2 rounded-xl text-[9px] font-black uppercase tracking-wider">
                                {pageMode === 'halaman' ? stats.pagesRead + '/604 Hlm' : stats.juzDone + '/30 Juz'}
                            </div>
                        </div>
                        {/* Toggle Ayat / Halaman */}
                        <div className="bg-black/10 rounded-2xl p-1 flex gap-1">
                            <button
                                onClick={function() { setPageMode('ayat'); }}
                                className={'flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all ' + (pageMode === 'ayat' ? 'bg-white text-emerald-700 shadow' : 'text-white/60')}
                            >
                                Ayat
                            </button>
                            <button
                                onClick={function() { setPageMode('halaman'); }}
                                className={'flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all ' + (pageMode === 'halaman' ? 'bg-white text-emerald-700 shadow' : 'text-white/60')}
                            >
                                Halaman
                            </button>
                        </div>
                        {pageMode === 'halaman' && (
                            <div className="text-center mt-2 text-[7px] font-black text-white/40 uppercase tracking-widest">
                                Referensi: Mushaf Madinah 604 hlm
                            </div>
                        )}
                    </div>
                </div>
            </header>

            <main className="px-5 -mt-8 relative z-10 space-y-4">

                {/* Target harian - tampil di surah & juz */}
                {(viewMode === 'surah' || viewMode === 'juz') && (
                    <section className="bg-white dark:bg-slate-900 rounded-[2rem] shadow-xl p-5 border border-slate-100 dark:border-slate-800 transition-colors">
                        <div className="flex items-center justify-between mb-3">
                            <span className="text-emerald-600 dark:text-emerald-400 font-black text-[9px] uppercase tracking-widest flex items-center gap-1.5">
                                <Icon name="target" size={13} /> Target Hari Ini
                            </span>
                            {targetJuz && (
                                <button
                                    onClick={function() { setTargetJuz(null); }}
                                    className="text-[9px] font-black text-slate-400 border border-slate-100 dark:border-slate-800 px-3 py-1 rounded-full"
                                >
                                    GANTI
                                </button>
                            )}
                        </div>
                        {!targetJuz ? (
                            <div className="relative">
                                <select
                                    aria-label="Pilih target juz hari ini"
                                    className="w-full bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl p-4 text-sm font-black appearance-none outline-none focus:border-emerald-500 transition-colors dark:text-slate-200"
                                    onChange={function(e) {
                                        setTargetJuz(e.target.value);
                                        setDailyStart(currentTotal);
                                        setTargetDate(new Date().toLocaleDateString('en-CA'));
                                    }}
                                    defaultValue=""
                                >
                                    <option value="" disabled>Mau sampai mana hari ini?</option>
                                    {JUZ_LIST.map(function(j) {
                                        return <option key={j.number} value={j.number}>Mencapai Juz {j.number}</option>;
                                    })}
                                    <option value="31">👑 Selesai Khatam</option>
                                </select>
                                <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-emerald-500">
                                    <Icon name="chevronDown" size={18} />
                                </div>
                            </div>
                        ) : (
                            <div>
                                <div className="flex justify-between items-end mb-2">
                                    <span className="text-xs font-black uppercase tracking-tight text-slate-600 dark:text-slate-400">
                                        {targetStats ? targetStats.label : ''}
                                    </span>
                                    <span className="text-emerald-600 dark:text-emerald-400 font-black text-2xl tabular-nums">
                                        {targetStats ? targetStats.pct : 0}%
                                    </span>
                                </div>
                                <div className="w-full bg-slate-100 dark:bg-slate-800 rounded-full h-3.5 overflow-hidden mb-2 shadow-inner">
                                    <div
                                        className="bg-emerald-500 h-full rounded-full transition-all duration-700"
                                        style={{ width: (targetStats ? targetStats.pct : 0) + '%' }}
                                    />
                                </div>
                                <div className="flex justify-between text-[9px] font-black text-slate-400 uppercase tracking-widest tabular-nums">
                                    <span>
                                        {targetStats ? targetStats.readToday : 0} / {targetStats ? targetStats.toRead : 0} Ayat
                                    </span>
                                    <span className="text-emerald-500">
                                        {targetStats && targetStats.reached ? '✅ Tercapai!' : 'Semangat Istiqomah!'}
                                    </span>
                                </div>
                            </div>
                        )}
                    </section>
                )}

                {/* Last Read Banner */}
                <LastReadBanner
                    lastRead={lastRead}
                    viewMode={viewMode}
                    searchTerm={searchTerm}
                    progress={progress}
                />

                {/* 3 Fitur Baru — tampil di surah view saja, sebelum list */}
                {viewMode === 'surah' && !searchTerm && (
                    <div className="space-y-4">
                        <HaidBanner isHaidToday={isHaidToday} onToggle={toggleHaidToday} />
                        <KhatamTarget currentTotal={currentTotal} haidLog={haidLog} pageMode={pageMode} pagesRead={stats.pagesRead} />
                        <WeeklyStats haidLog={haidLog} onToggleHaid={toggleHaidDate} pageMode={pageMode} />
                        <JuzMap progress={progress} />
                    </div>
                )}

                {/* Tabs + Search */}
                <div className="sticky top-3 z-40 space-y-3">
                    <div className="bg-white/85 dark:bg-slate-900/85 backdrop-blur-xl rounded-[1.5rem] shadow-xl p-1.5 flex gap-1 border border-white/60 dark:border-slate-800">
                        {TABS.map(function(tab) {
                            const active = viewMode === tab.id;
                            return (
                                <button
                                    key={tab.id}
                                    onClick={function() { setViewMode(tab.id); scrollToTop(); }}
                                    className={'flex-1 py-2.5 rounded-xl text-[8px] font-black transition-all flex flex-col items-center gap-0.5 ' + (active ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-400')}
                                >
                                    <Icon name={tab.icon} size={14} strokeWidth={active ? 3 : 2} />
                                    {tab.label}
                                </button>
                            );
                        })}
                    </div>
                    {(viewMode === 'surah' || viewMode === 'juz') && (
                        <div className="bg-white/90 dark:bg-slate-900/90 backdrop-blur-2xl rounded-[1.2rem] shadow-lg p-3.5 border border-slate-100 dark:border-slate-800 flex items-center gap-3">
                            <Icon name="search" size={15} className="text-slate-300 dark:text-slate-600" strokeWidth={3} />
                            <input
                                type="text"
                                placeholder="Cari surah atau nomor..."
                                className="w-full bg-transparent outline-none font-black text-sm text-slate-800 dark:text-slate-200 placeholder:text-slate-300"
                                value={searchTerm}
                                onChange={function(e) { setSearchTerm(e.target.value); }}
                            />
                            {searchTerm && (
                                <button onClick={function() { setSearchTerm(''); }} aria-label="Hapus pencarian" className="text-slate-500 dark:text-slate-400 font-black text-xl leading-none">×</button>
                            )}
                        </div>
                    )}
                </div>

                {/* Surah List — Compact */}
                {viewMode === 'surah' && filteredSurahs.map(function(surah) {
                    const cur = progress[surah.number] || 0;
                    const comp = cur === surah.verses;
                    const range = getSurahPageRange(surah.number);
                    const curPage = cur > 0 ? getPageForVerse(surah.number, cur) : null;
                    const pct = Math.round((cur / surah.verses) * 100);
                    return (
                        <div
                            key={surah.number}
                            id={'s-' + surah.number}
                            className={'bg-white dark:bg-slate-900 rounded-[1.5rem] border-2 transition-all duration-300 ' + (comp ? 'border-emerald-500 bg-emerald-50/20 dark:bg-emerald-950/20' : 'border-slate-100 dark:border-slate-800')}
                        >
                            <div className="flex items-center gap-3 px-4 py-3">
                                {/* Nomor */}
                                <div className={'w-9 h-9 rounded-xl flex items-center justify-center font-black text-sm shadow-inner flex-shrink-0 ' + (comp ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900 dark:text-emerald-200' : 'bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400')}>
                                    {surah.number}
                                </div>

                                {/* Nama + bar — flex-1, tidak truncate */}
                                <div className="flex-1 min-w-0">
                                    <div className="flex items-start justify-between gap-2 mb-1.5">
                                        <h2 className="font-black text-sm tracking-tight text-slate-800 dark:text-slate-200 leading-tight">
                                            {surah.name}
                                        </h2>
                                        <div className="flex items-center gap-1.5 flex-shrink-0 mt-0.5">
                                            <span className={'text-[10px] font-black tabular-nums ' + (comp ? 'text-emerald-500' : 'text-slate-500 dark:text-slate-400')}>
                                                {comp ? '✓' : pct + '%'}
                                            </span>
                                            {pageMode === 'halaman' && range && !comp && (
                                                <span className="text-[9px] font-black text-emerald-600 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-950/40 px-1.5 py-0.5 rounded-full tabular-nums">
                                                    {'Hlm ' + (curPage || range.startPage)}
                                                </span>
                                            )}
                                        </div>
                                    </div>
                                    <div className="h-1.5 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                                        <div
                                            className={'h-full rounded-full transition-all duration-500 ' + (comp ? 'bg-emerald-500' : 'bg-emerald-300 dark:bg-emerald-700')}
                                            style={{ width: pct + '%' }}
                                        />
                                    </div>
                                    {pageMode === 'halaman' && range && (
                                        <div className="text-[8px] font-black text-slate-400 dark:text-slate-600 mt-0.5 tabular-nums">
                                            Hlm {range.startPage}–{range.endPage}
                                        </div>
                                    )}
                                </div>

                                {/* Controls */}
                                <div className="flex items-center gap-1.5 flex-shrink-0">
                                    <button
                                        onClick={function() { updateVerse(surah.number, cur - 1); }}
                                        aria-label={'Kurangi ayat ' + surah.name}
                                        className="w-8 h-8 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 font-black text-lg active:scale-90 transition-all select-none flex items-center justify-center"
                                    >−</button>
                                    <CompactInput
                                        surahNumber={surah.number}
                                        cur={cur}
                                        maxVerse={surah.verses}
                                        onUpdate={updateVerse}
                                    />
                                    <button
                                        onClick={function() { updateVerse(surah.number, cur + 1); }}
                                        aria-label={'Tambah ayat ' + surah.name}
                                        className="w-8 h-8 rounded-lg bg-emerald-600 text-white font-black text-lg active:scale-90 transition-all select-none flex items-center justify-center shadow-sm"
                                    >+</button>
                                </div>

                                {/* Check */}
                                <button
                                    onClick={function() { toggleComplete(surah.number); }}
                                    aria-label={(comp ? 'Tandai belum selesai: ' : 'Tandai selesai: ') + surah.name}
                                    className={'transition-all active:scale-75 flex-shrink-0 ' + (comp ? 'text-emerald-500' : 'text-slate-200 dark:text-slate-700')}
                                >
                                    <Icon name={comp ? 'checkCircle' : 'circle'} size={26} strokeWidth={comp ? 0 : 1.5} className={comp ? 'fill-current' : ''} />
                                </button>
                            </div>
                        </div>
                    );
                })}

                {/* Juz List */}
                {viewMode === 'juz' && filteredJuz.map(function(juz) {
                    const comp = isJuzComplete(juz.number, progress);
                    return (
                        <div
                            key={juz.number}
                            onClick={function() { toggleJuz(juz.number); }}
                            className={'bg-white dark:bg-slate-900 rounded-[2rem] p-5 border-2 flex items-center justify-between active:scale-[.98] transition-all ' + (comp ? 'border-emerald-500 bg-emerald-50/20 dark:bg-emerald-950/20' : 'border-slate-100 dark:border-slate-800')}
                        >
                            <div className="flex items-center gap-4">
                                <div className={'w-14 h-14 rounded-2xl flex items-center justify-center font-black text-xl shadow-inner ' + (comp ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900 dark:text-emerald-200' : 'bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400')}>
                                    {juz.number}
                                </div>
                                <div>
                                    <h2 className="font-black text-xl tracking-tight">Juz {juz.number}</h2>
                                    <p className="text-[9px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-tighter mt-0.5">{juz.start}</p>
                                </div>
                            </div>
                            <div className={'transition-all ' + (comp ? 'text-emerald-500 scale-110' : 'text-slate-100 dark:text-slate-700')}>
                                <Icon name={comp ? 'checkCircle' : 'circle'} size={38} className={comp ? 'fill-current' : ''} />
                            </div>
                        </div>
                    );
                })}

                {/* Prayer View */}
                {viewMode === 'prayer' && <PrayerView />}

                {/* Settings */}
                {viewMode === 'settings' && (
                    <div className="space-y-4 pb-10 anim-fadeup">
                        <div className="bg-white dark:bg-slate-900 rounded-[2.5rem] p-7 shadow-2xl border border-slate-100 dark:border-slate-800 text-center">
                            <div className="inline-flex bg-emerald-100 dark:bg-emerald-900 text-emerald-600 dark:text-emerald-200 p-5 rounded-[2rem] mb-5 shadow-inner anim-bounce">
                                <Icon name="trophy" size={36} />
                            </div>
                            <h3 className="font-black text-2xl mb-1 tabular-nums">Total Khatam: {khatamCount}x</h3>
                            <p className="text-xs text-slate-400 font-bold uppercase tracking-widest mb-6">Barakallahfikum!</p>
                            <div className="grid grid-cols-2 gap-3">
                                <button
                                    onClick={exportData}
                                    className="flex items-center justify-center gap-2 bg-slate-100 dark:bg-slate-800 p-4 rounded-2xl text-[9px] font-black uppercase tracking-widest text-slate-600 dark:text-slate-300 active:scale-95 transition-transform"
                                >
                                    <Icon name="download" size={14} /> Cadangkan
                                </button>
                                <label className="flex items-center justify-center gap-2 bg-slate-100 dark:bg-slate-800 p-4 rounded-2xl text-[9px] font-black uppercase tracking-widest text-slate-600 dark:text-slate-300 cursor-pointer active:scale-95 transition-transform">
                                    <Icon name="upload" size={14} /> Pulihkan
                                    <input type="file" accept=".json" onChange={importData} className="hidden" />
                                </label>
                            </div>
                            <button
                                onClick={function() {
                                    if (window.confirm('Hapus seluruh progres?')) {
                                        setProgress({});
                                        setKhatamCount(0);
                                        setStreak(0);
                                        setLastRead(null);
                                        setLastActiveDate(null);
                                        setTargetJuz(null);
                                        setDailyStart(0);
                                        removeLocal('q-daily-log');
                                        removeLocal('q-daily-log-start');
                                        removeLocal('q-khatam-target');
                                        removeLocal('q-haid-log');
                                        removeLocal('q-page-mode');
                                        alert('Data dibersihkan.');
                                    }
                                }}
                                className="w-full mt-4 bg-red-50 dark:bg-red-950/30 text-red-500 font-black py-4 rounded-2xl text-[9px] uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-transform"
                            >
                                <Icon name="trash" size={14} /> Hapus Seluruh Data
                            </button>
                        </div>

                        <div className="bg-white dark:bg-slate-900 rounded-[2rem] p-5 shadow-xl border border-slate-100 dark:border-slate-800 space-y-3">
                            <div className="flex justify-between items-center py-2 border-b border-slate-50 dark:border-slate-800">
                                <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Tampilan</span>
                                <button
                                    onClick={function() { setIsDark(!isDark); }}
                                    className="text-xs font-black bg-slate-50 dark:bg-slate-800 px-3 py-1.5 rounded-full flex items-center gap-1.5 dark:text-slate-200 active:scale-95"
                                >
                                    <Icon name={isDark ? 'sun' : 'moon'} size={12} />
                                    {isDark ? 'Mode Terang' : 'Mode Gelap'}
                                </button>
                            </div>
                            <div className="flex justify-between items-center py-2 border-b border-slate-50 dark:border-slate-800">
                                <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Versi</span>
                                <span className="text-xs font-black bg-slate-50 dark:bg-slate-800 px-3 py-1 rounded-full dark:text-slate-200">9.0.0</span>
                            </div>
                            <div className="flex justify-between items-center py-2 border-b border-slate-50 dark:border-slate-800">
                                <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Penyimpanan</span>
                                <span className="text-xs font-black text-emerald-600">Lokal + Backup</span>
                            </div>
                            <div className="flex justify-between items-center py-2">
                                <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Total Ayat</span>
                                <span className="text-xs font-black text-emerald-600 tabular-nums">{currentTotal}/6236</span>
                            </div>
                        </div>
                        <p className="text-center text-[8px] font-black text-slate-300 dark:text-slate-700 uppercase tracking-widest">
                            Jurnal Quran by Arief • v9.0.0
                        </p>
                    </div>
                )}
            </main>

            {/* Scroll to top */}
            {showScrollTop && (
                <button
                    onClick={scrollToTop}
                    aria-label="Scroll ke atas"
                    className="fixed bottom-28 right-5 bg-emerald-600 text-white p-4 rounded-[1.2rem] shadow-2xl z-50 active:scale-75 transition-all"
                >
                    <Icon name="arrowUp" size={22} strokeWidth={3} />
                </button>
            )}

            {/* Bottom Nav */}
            <nav className="bottom-nav fixed bottom-0 left-0 right-0 bg-white/85 dark:bg-slate-900/85 backdrop-blur-3xl border-t border-slate-100 dark:border-slate-800 flex items-center justify-around px-2 z-50 shadow-[0_-8px_30px_rgba(0,0,0,0.06)] transition-colors" role="navigation" aria-label="Menu utama">
                {TABS.map(function(tab) {
                    const active = viewMode === tab.id;
                    return (
                        <button
                            key={tab.id}
                            onClick={function() { setViewMode(tab.id); scrollToTop(); }}
                            aria-label={'Tab ' + tab.label}
                            aria-current={active ? 'page' : undefined}
                            className={'flex flex-col items-center gap-1 transition-all pt-3 pb-1 flex-1 ' + (active ? 'text-emerald-600' : 'text-slate-300 dark:text-slate-600')}
                        >
                            <div className={'p-1.5 rounded-xl ' + (active ? 'bg-emerald-50 dark:bg-emerald-900/30' : '')}>
                                <Icon name={tab.icon} size={20} strokeWidth={active ? 3 : 2} />
                            </div>
                            <span className="text-[8px] font-black uppercase tracking-widest">{tab.label}</span>
                        </button>
                    );
                })}
            </nav>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
